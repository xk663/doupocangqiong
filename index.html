<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>斗破苍穹 · 修炼模拟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* === CSS Custom Properties === */
:root {
  --bg-deep: #050508;
  --bg-panel: #0a0a12;
  --bg-card: #0d0d18;
  --bg-hover: #111122;
  --border-subtle: #1a1a2e;
  --border-gold: #d4a84b44;
  --border-gold-bright: #d4a84b88;
  --text-primary: #d4a84b;
  --text-secondary: #887744;
  --text-body: #aaa;
  --text-muted: #665533;
  --text-dim: #444;
  --accent-fire: #ff6b35;
  --accent-purple: #c084fc;
  --accent-green: #88cc88;
  --accent-blue: #4488ff;
  --accent-ice: #88cccc;
  --accent-thunder: #cccc44;
  --accent-light: #ccaa44;
  --accent-dark: #886688;
  --accent-metal: #ccaa44;
  --accent-poison: #88aa44;
  --accent-space: #ccaadd;
  --font-serif: 'Noto Serif SC', serif;
  --font-sans: 'Noto Sans SC', sans-serif;
  --sidebar-width: 72px;
  --transition-fast: 150ms ease-out;
  --transition-normal: 250ms ease-out;
  --transition-slow: 400ms ease-out;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-gold: 0 0 20px rgba(212,168,75,0.15);
  --z-sidebar: 100;
  --z-modal: 200;
  --z-toast: 300;
  --z-llm: 250;
}

/* === Reset === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-sans);background:var(--bg-deep);color:var(--text-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{border:none;outline:none;cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:2px}

/* === Typography === */
h1,h2,h3,h4{font-family:var(--font-serif);color:var(--text-primary);font-weight:600}
.serif{font-family:var(--font-serif)}
.text-gold{color:var(--text-primary)}
.text-muted{color:var(--text-muted)}
.text-body{color:var(--text-body)}

/* === View Container Base === */
.view{position:absolute;top:0;left:0;width:100%;height:100%;display:none;overflow:hidden;transition:opacity var(--transition-normal);opacity:0}
.view.active{display:flex;opacity:1}

/* === Title Screen === */
.title-btn {
  width: 240px;
  padding: 12px 0;
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-body);
  font-family: var(--font-serif);
  font-size: 15px;
  letter-spacing: 4px;
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}
.title-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,168,75,0.05), transparent);
  transition: left 0.5s ease;
}
.title-btn:hover::before { left: 100%; }
.title-btn:hover {
  border-color: var(--border-gold-bright);
  color: var(--text-primary);
  box-shadow: var(--shadow-gold);
}
.title-btn.primary {
  border-color: var(--border-gold);
  color: var(--text-primary);
}
.title-btn.primary:hover {
  border-color: var(--text-primary);
  box-shadow: 0 0 30px rgba(212,168,75,0.25);
}

/* === Creation Steps === */
.step-indicator {
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 16px;transition:all var(--transition-normal);
}
.step-indicator .step-num {
  font-family:var(--font-serif);font-size:20px;color:var(--text-dim);
}
.step-indicator .step-label {
  font-size:11px;color:var(--text-dim);
}
.step-indicator.active .step-num { color: var(--text-primary); }
.step-indicator.active .step-label { color: var(--text-secondary); }
.step-indicator.done .step-num { color: var(--text-secondary); }
.step-indicator.done .step-label { color: var(--text-secondary); }
.step-line {
  width:40px;height:1px;background:var(--border-subtle);align-self:center;transition:background var(--transition-normal);
}
.step-line.done { background: var(--border-gold-bright); }
.creation-nav-btn {
  padding:10px 32px;background:transparent;border:1px solid var(--border-subtle);
  color:var(--text-body);font-family:var(--font-serif);font-size:14px;
  letter-spacing:4px;transition:all var(--transition-normal);
}
.creation-nav-btn:hover { border-color:var(--border-gold-bright);color:var(--text-primary); }
.creation-nav-btn.primary { border-color:var(--border-gold);color:var(--text-primary); }

/* === Form Elements === */
.form-group { margin-bottom:20px; }
.form-label { display:block;font-family:var(--font-serif);color:var(--text-secondary);font-size:13px;margin-bottom:8px;letter-spacing:2px; }
.form-input {
  width:100%;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);font-size:14px;border-radius:4px;transition:border-color var(--transition-fast);
}
.form-input:focus { border-color:var(--border-gold-bright); }
.form-slider {
  -webkit-appearance:none;width:100%;height:4px;background:var(--border-subtle);border-radius:2px;outline:none;
}
.form-slider::-webkit-slider-thumb {
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--text-primary);cursor:pointer;
  box-shadow:0 0 8px rgba(212,168,75,0.4);
}
.option-group { display:flex;gap:8px; }
.option-btn {
  flex:1;padding:10px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);text-align:center;transition:all var(--transition-fast);
}
.option-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }
.option-btn.selected { border-color:var(--text-primary);color:var(--text-primary);background:rgba(212,168,75,0.08); }
.difficulty-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);padding:12px;
  border-radius:6px;cursor:pointer;transition:all var(--transition-fast);
}
.difficulty-card:hover { border-color:var(--border-gold-bright);transform:translateY(-1px); }
.difficulty-card.selected { border-color:var(--text-primary)!important;background:rgba(212,168,75,0.05); }
.dice-btn {
  background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-secondary);
  padding:8px 12px;border-radius:4px;transition:all var(--transition-fast);
}
.dice-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }

/* === Race & Identity Cards === */
.race-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  padding:14px;border-radius:6px;cursor:pointer;
  transition:all var(--transition-normal);
}
.race-card:hover { transform:translateY(-2px);border-color:var(--border-gold);box-shadow:var(--shadow-gold); }
.race-card.selected { border-color:var(--text-primary)!important;background:rgba(212,168,75,0.05); }
.identity-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  padding:20px;border-radius:6px;cursor:pointer;text-align:center;
  transition:all var(--transition-normal);
}
.identity-card:hover { transform:translateY(-2px);border-color:var(--border-gold); }
.identity-card.selected { border-color:var(--text-primary)!important;background:rgba(212,168,75,0.05); }

/* === Stats === */
.stat-row { margin-bottom:12px; }

/* === Talents & Attributes === */
.talent-chip {
  padding:5px 12px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);font-size:12px;border-radius:16px;cursor:pointer;
  transition:all var(--transition-fast);
}
.talent-chip:hover { border-color:var(--border-gold); }
.talent-chip.selected { background:rgba(212,168,75,0.1);border-color:var(--text-primary);color:var(--text-primary); }
.attr-chip {
  padding:8px 20px;background:var(--bg-card);border:1px solid var(--border-subtle);
  font-family:var(--font-serif);font-size:14px;border-radius:6px;cursor:pointer;
  transition:all var(--transition-fast);
}
.attr-chip:hover { border-color:var(--border-gold-bright); }
.attr-chip.selected {
  border-color: var(--text-primary) !important;
  background: rgba(212,168,75,0.15) !important;
  box-shadow: 0 0 12px rgba(212,168,75,0.25);
}

/* === Sidebar === */
.sidebar-btn {
  width:44px;height:44px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:transparent;color:var(--text-dim);
  border-radius:8px;transition:all var(--transition-normal);gap:3px;position:relative;
}
.sidebar-btn:hover { color:var(--text-secondary);background:rgba(212,168,75,0.05); }
.sidebar-btn.active { color:var(--text-primary); }
.sidebar-btn.active::after {
  content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);
  width:2px;height:20px;background:var(--text-primary);border-radius:1px;
  transition:top var(--transition-normal);
}
.sidebar-label { font-size:9px; }
.game-subview { display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto; }
.game-subview.active { display:flex;flex-direction:column; }

/* === World Map === */
.map-region {
  position:absolute;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all var(--transition-normal);
}
.map-region:hover {
  transform:scale(1.08);
  filter:brightness(1.3);
  z-index:10;
  box-shadow:0 0 20px rgba(212,168,75,0.3);
}
.map-region.player-location {
  animation:player-region-glow 2s infinite;
}
@keyframes player-region-glow {
  0%,100% { box-shadow:0 0 8px rgba(80,160,80,0.3); }
  50% { box-shadow:0 0 20px rgba(80,160,80,0.6); }
}
.map-region.danger { }
.player-marker {
  width:6px;height:6px;background:var(--text-primary);border-radius:50%;
  position:absolute;top:-3px;left:50%;box-shadow:0 0 10px var(--text-primary);
  animation:marker-pulse 2s infinite;
}
@keyframes marker-pulse {
  0%,100% { box-shadow:0 0 6px var(--text-primary); }
  50% { box-shadow:0 0 16px var(--text-primary),0 0 24px rgba(212,168,75,0.5); }
}
.region-label {
  font-family:var(--font-serif);font-size:11px;color:var(--text-secondary);
  pointer-events:none;
}

/* === Studio === */
.studio-room {
  position:absolute;width:120px;height:80px;
  background:var(--bg-card);border:1px solid var(--border-gold);
  border-radius:6px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  cursor:pointer;transition:all var(--transition-normal);
  transform:translate(-50%,-50%);
}
.studio-room:hover { box-shadow:var(--shadow-gold);transform:translate(-50%,-50%) translateY(-2px); }
.room-name { color:var(--text-primary);font-family:var(--font-serif);font-size:13px; }
.room-status { color:var(--text-muted);font-size:10px; }
.expand-btn {
  position:absolute;padding:4px 10px;background:transparent;
  border:1px dashed var(--border-subtle);color:var(--text-dim);
  font-size:10px;font-family:var(--font-serif);cursor:pointer;
  transform:translate(-50%,-50%);transition:all var(--transition-normal);
}
.expand-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }

/* === Personnel === */
.char-avatar {
  width:48px;height:48px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  background:linear-gradient(135deg,var(--bg-hover),var(--bg-card));
  border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;
}
.char-avatar span {
  font-family:var(--font-serif);font-size:18px;color:var(--text-primary);
}
.personnel-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  padding:16px;border-radius:8px;cursor:pointer;
  transition:all var(--transition-normal);
}
.personnel-card:hover { border-color:var(--border-gold);transform:translateY(-2px);box-shadow:var(--shadow-gold); }

/* === Modal === */
.modal-overlay {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:var(--z-modal);opacity:0;transition:opacity var(--transition-normal);
  pointer-events:none;
}
.modal-overlay.show { opacity:1;pointer-events:all; }
.modal-content {
  background:var(--bg-panel);border:1px solid var(--border-gold);
  border-radius:8px;padding:24px;min-width:360px;max-width:560px;
  max-height:80vh;overflow-y:auto;position:relative;
  transform:scale(0.95);transition:transform var(--transition-normal);
}
.modal-overlay.show .modal-content { transform:scale(1); }
.modal-close {
  position:absolute;top:12px;right:12px;background:transparent;
  color:var(--text-dim);padding:4px;border-radius:4px;transition:all var(--transition-fast);
}
.modal-close:hover { color:var(--text-primary);background:rgba(212,168,75,0.1); }

/* === Toggle === */
.toggle-switch { position:relative;display:inline-block;width:40px;height:22px; }
.toggle-switch input { opacity:0;width:0;height:0; }
.toggle-slider {
  position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:22px;transition:all var(--transition-fast);
}
.toggle-slider::before {
  content:'';position:absolute;height:16px;width:16px;left:2px;bottom:2px;
  background:var(--text-dim);border-radius:50%;transition:all var(--transition-fast);
}
input:checked + .toggle-slider { border-color:var(--border-gold);background:rgba(212,168,75,0.1); }
input:checked + .toggle-slider::before { background:var(--text-primary);transform:translateX(18px); }
.add-api-btn {
  width:100%;padding:8px;background:transparent;border:1px dashed var(--border-subtle);
  color:var(--text-muted);font-family:var(--font-serif);font-size:12px;
  border-radius:4px;cursor:pointer;transition:all var(--transition-fast);
}
.add-api-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }
.text-btn { background:transparent;border:none;color:var(--text-secondary);font-size:11px;cursor:pointer; }
.text-btn:hover { color:var(--text-primary); }
.text-btn.danger { color:#883333; }
.text-btn.danger:hover { color:#cc4444; }

/* === LLM Chat === */
.llm-pulse {
  position:absolute;width:100%;height:100%;border-radius:50%;
  border:1px solid var(--border-gold);animation:llm-pulse 2s infinite;
}
@keyframes llm-pulse {
  0%,100% { transform:scale(1);opacity:0.3; }
  50% { transform:scale(1.3);opacity:1; }
}
.msg { padding:8px 12px;border-radius:8px;font-size:12px;max-width:85%;line-height:1.5; }
.msg.ai { background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-body);align-self:flex-start;border-left:2px solid #888; }
.msg.user { background:rgba(212,168,75,0.08);border:1px solid var(--border-gold);color:var(--text-primary);align-self:flex-end;border-right:2px solid var(--text-primary); }
.msg.typing::after { content:'▍';animation:blink 0.6s infinite;color:var(--text-primary); }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
.quick-cmd {
  padding:4px 10px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-secondary);font-size:10px;border-radius:12px;cursor:pointer;transition:all var(--transition-fast);
}
.quick-cmd:hover { border-color:var(--border-gold);color:var(--text-primary); }

/* === Toast === */
@keyframes toast-in { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
@keyframes toast-out { from{transform:translateX(0);opacity:1;} to{transform:translateX(100%);opacity:0;} }

/* === Selection === */
::selection { background: rgba(212,168,75,0.3);color: var(--text-primary); }

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* === Save Manager === */
.save-entry {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 6px; padding: 14px; margin-bottom: 8px;
  transition: all var(--transition-normal);
}
.save-entry:hover { border-color: var(--border-gold); }
.save-entry-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
}
.save-entry-name { color: var(--text-primary); font-family: var(--font-serif); font-size: 14px; font-weight: 600; }
.save-entry-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.save-entry-actions { display: flex; gap: 6px; }
.save-action-btn {
  padding: 4px 12px; background: var(--bg-card); border: 1px solid var(--border-subtle);
  color: var(--text-secondary); font-size: 11px; border-radius: 4px; cursor: pointer;
  transition: all var(--transition-fast);
}
.save-action-btn:hover { border-color: var(--border-gold); color: var(--text-primary); }
.save-action-btn.danger { color: #883333; }
.save-action-btn.danger:hover { border-color: #cc4444; color: #cc4444; }
.save-action-btn.primary { color: var(--accent-green); border-color: var(--accent-green)33; }
.save-action-btn.primary:hover { border-color: var(--accent-green); }
.save-empty { text-align: center; color: var(--text-dim); padding: 40px; font-size: 13px; }

/* === Lottery Wheel === */
.lottery-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
.wheel-wrapper {
  position: relative;
  width: 320px;
  height: 320px;
}
.wheel-canvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  box-shadow: 0 0 30px rgba(212,168,75,0.2), 0 0 60px rgba(212,168,75,0.1);
}
.wheel-pointer {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid var(--text-primary);
  filter: drop-shadow(0 0 6px rgba(212,168,75,0.6));
  z-index: 5;
}
.wheel-center-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: var(--bg-panel);
  border: 2px solid var(--border-gold);
  color: var(--text-primary);
  font-family: var(--font-serif);
  font-size: 14px;
  cursor: pointer;
  z-index: 5;
  transition: all var(--transition-fast);
}
.wheel-center-btn:hover {
  border-color: var(--text-primary);
  box-shadow: 0 0 20px rgba(212,168,75,0.4);
}
.wheel-center-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.lottery-result {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  font-family: var(--font-serif);
  font-size: 13px;
  animation: result-pop 0.5s ease-out;
}
@keyframes result-pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.attr-record-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 12px;
  font-family: var(--font-serif);
  font-size: 13px;
  border: 1px solid;
}
.attr-record-tag.locked {
  box-shadow: 0 0 8px rgba(212,168,75,0.6);
  cursor: pointer;
}
.attr-record-tag.immutable {
  cursor: pointer;
}
</style>
</head>
<body>

<!-- VIEW: Title Screen -->
<div id="view-title" class="view active" style="flex-direction:column;align-items:center;justify-content:center;position:relative;background:radial-gradient(ellipse at center,#0f0f1a 0%,#050508 60%);">
  <canvas id="title-particles" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
  <div style="position:relative;z-index:2;text-align:center;">
    <div style="margin-bottom:8px;">
      <svg width="64" height="64" viewBox="0 0 64 64" style="display:block;margin:0 auto 12px;">
        <path d="M32 4 C32 4 12 20 12 36 C12 47 21 56 32 56 C43 56 52 47 52 36 C52 20 32 4 32 4Z" fill="none" stroke="#d4a84b" stroke-width="1.5"/>
        <path d="M32 14 C32 14 18 26 18 36 C18 44 24 50 32 50 C40 50 46 44 46 36 C46 26 32 14 32 14Z" fill="none" stroke="#d4a84b" stroke-width="1" opacity="0.6"/>
        <circle cx="32" cy="32" r="4" fill="#d4a84b" opacity="0.8"/>
        <circle cx="32" cy="32" r="2" fill="#ff6b35"/>
      </svg>
    </div>

// ==============================
// POINTS SYSTEM
// ==============================

function updatePointsDisplay() {
  var el = document.getElementById('creation-points-value');
  if (!el) return;
  if (!GameState.player.difficulty) {
    // No difficulty selected yet — show 0
    el.textContent = '0';
    el.style.color = 'var(--text-dim)';
    return;
  }
  var remaining = GameState.player.points - GameState.player.pointsSpent;
  el.textContent = remaining;
  el.style.color = remaining > 20 ? 'var(--accent-green)' : remaining > 5 ? '#ffaa00' : '#ff4444';
}

function recalculatePoints() {
  var spent = 0;
  // Race cost
  var race = RACES.find(function(r) { return r.id === GameState.player.race; });
  if (race) spent += race.cost;
  // Identity cost
  var identity = IDENTITIES.find(function(i) { return i.id === GameState.player.identity; });
  if (identity) spent += identity.cost;
  // Base stats: each point costs 1
  var bs = GameState.player.baseStats;
  for (var k in bs) { if (bs.hasOwnProperty(k)) spent += bs[k]; }
  // Talent costs
  GameState.player.talents.forEach(function(tid) {
    for (var t = 0; t < TALENT_TIERS.length; t++) {
      var tier = TALENT_TIERS[t];
      if (TALENTS[tier.key].some(function(tl) { return tl.id === tid; })) {
        spent += tier.cost;
        break;
      }
    }
  });
  GameState.player.pointsSpent = spent;
  updatePointsDisplay();
}

// ==============================
// PERFORMANCE STATS
// ==============================

function updatePerformanceStats() {
  var race = RACES.find(function(r) { return r.id === GameState.player.race; });
  if (!race) return;
  var bs = GameState.player.baseStats;
  var c = race.coeff;
  var perf = {
    hp: Math.round(bs.endurance * 20 * c.hp),
    dp: Math.round(bs.douqi * 20 * c.dp),
    pa: Math.round(bs.strength * 8 * c.pa),
    da: Math.round(bs.douqi * 8 * c.da),
    pd: Math.round((bs.endurance + bs.strength) * 4 * c.pd),
    dd: Math.round((bs.douqi + bs.soul) * 4 * c.dd),
    ph: Math.round(bs.agility * 5 * c.ph),
    dh: Math.round(bs.soul * 5 * c.dh),
    cr: Math.round(bs.agility * c.cr * 10) / 10
  };
  GameState.player.performanceStats = perf;
  for (var k in perf) {
    if (!perf.hasOwnProperty(k)) continue;
    var el = document.getElementById('perf-stat-' + k);
    if (el) el.textContent = k === 'cr' ? perf[k] + '%' : perf[k];
  }
}

var creationCurrentStep = -1;

function startNewGame() {
  GameState.phase = 'creation';
  GameState.player = {
    name: '', gender: '', age: 18, difficulty: '', points: 0, pointsSpent: 0,
    race: '', identity: '',

    douqiAttributes: []
  };
  showView('view-creation');
  creationCurrentStep = -1;
  creationNext();
}

function creationNext() {
  creationCurrentStep++;
  if (creationCurrentStep > 4) { confirmCreation(); return; }
  var prevBtn = document.getElementById('creation-prev');
  var nextBtn = document.getElementById('creation-next');
  if (prevBtn) prevBtn.style.display = creationCurrentStep === 0 ? 'none' : 'inline-block';
  if (nextBtn) nextBtn.textContent = creationCurrentStep === 4 ? '确认创角' : '下一步 →';
  updateStepIndicator();
  switch(creationCurrentStep) {
    case 0: renderCreationStep0(); break;
    case 1: renderCreationStep1(); break;
    case 2: renderCreationStep2(); break;
    case 3: renderCreationStep3(); break;
    case 4: renderCreationStep4(); break;
  }
}

function creationPrev() {
  creationCurrentStep = Math.max(0, creationCurrentStep - 1);
  var prevBtn = document.getElementById('creation-prev');
  var nextBtn = document.getElementById('creation-next');
  if (prevBtn) prevBtn.style.display = creationCurrentStep === 0 ? 'none' : 'inline-block';
  if (nextBtn) nextBtn.textContent = creationCurrentStep === 4 ? '确认创角' : '下一步 →';
  updateStepIndicator();
  switch(creationCurrentStep) {
    case 0: renderCreationStep0(); break;
    case 1: renderCreationStep1(); break;
    case 2: renderCreationStep2(); break;
    case 3: renderCreationStep3(); break;
    case 4: renderCreationStep4(); break;
  }
}

function updateStepIndicator() {
  document.querySelectorAll('#creation-steps .step-indicator').forEach(function(el, i) {
    el.classList.remove('active', 'done');
    if (i < creationCurrentStep) el.classList.add('done');
    if (i === creationCurrentStep) el.classList.add('active');
  });
  document.querySelectorAll('#creation-steps .step-line').forEach(function(el, i) {
    el.classList.toggle('done', i < creationCurrentStep);
  });
}

// ==============================

// ==============================

var wheelAngle = 0;
var isSpinning = false;
var wheelDrawn = false;

function drawWheel() {
  var canvas = document.getElementById('lottery-wheel');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var cx = 160, cy = 160, r = 150;
  var segments = DOUQI_ATTRS.length;
  var arcSize = (2 * Math.PI) / segments;

  ctx.clearRect(0, 0, 320, 320);

  // Draw outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r + 8, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(212,168,75,0.4)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Draw segments
  for (var i = 0; i < segments; i++) {
    var startAngle = i * arcSize + wheelAngle;
    var endAngle = startAngle + arcSize;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();

    // Alternating dark backgrounds
    ctx.fillStyle = i % 2 === 0 ? '#0d0d18' : '#111122';
    ctx.fill();

    // Segment border
    ctx.strokeStyle = 'rgba(212,168,75,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Attribute name
    var midAngle = startAngle + arcSize / 2;
    var textR = r * 0.65;
    var tx = cx + Math.cos(midAngle) * textR;
    var ty = cy + Math.sin(midAngle) * textR;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.fillStyle = DOUQI_ATTRS[i].color;
    ctx.font = 'bold 13px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    ctx.fillText(DOUQI_ATTRS[i].name, 0, 0);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 36, 0, 2 * Math.PI);
  ctx.fillStyle = '#0a0a12';
  ctx.fill();
  ctx.strokeStyle = 'rgba(212,168,75,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  wheelDrawn = true;
}

function spinWheel() {
  if (isSpinning) return;

  var remaining = GameState.player.points - GameState.player.pointsSpent;
  if (remaining < 5) {
    showToast('点数不足！需要 5 点', 'error');
    return;
  }

  isSpinning = true;
  var btn = document.getElementById('wheel-spin-btn');
  if (btn) btn.disabled = true;

  // Deduct points
  GameState.player.pointsSpent += 5;
  updatePointsDisplay();
  saveToLocalStorage();

  // Corrected pointer math: pointer is at top (12 o'clock = -PI/2)
  var pointerAngle = -Math.PI / 2;
  var arcSize = (2 * Math.PI) / DOUQI_ATTRS.length;
  var randomSegment = Math.floor(Math.random() * DOUQI_ATTRS.length);
  var extraSpins = Math.floor(Math.random() * 5) + 6; // 6-10 full rotations
  var segmentCenter = randomSegment * arcSize + arcSize / 2;
  var targetAngle = extraSpins * 2 * Math.PI - segmentCenter + Math.PI / 2;

  var canvas = document.getElementById('lottery-wheel');
  if (canvas) {
    canvas.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
    wheelAngle += targetAngle;
    canvas.style.transform = 'rotate(' + (wheelAngle * 180 / Math.PI) + 'deg)';
  }

  // Determine result after spin animation
  setTimeout(function() {
    isSpinning = false;

    // Determine if jackpot (20% chance for 2 attributes if player has 0)
    var isJackpot = GameState.player.douqiAttributes.length === 0 && Math.random() < 0.2;

    // Get the landed attribute
    var landedAttr = DOUQI_ATTRS[randomSegment];

    // Add to player's attributes (avoid duplicates)
    var added = [];
    if (GameState.player.douqiAttributes.indexOf(landedAttr.id) === -1) {
      added.push(landedAttr);
    }

    if (isJackpot && GameState.player.douqiAttributes.length < 2) {
      // Pick a second different attribute
      var remaining2 = DOUQI_ATTRS.filter(function(a) {
        return GameState.player.douqiAttributes.indexOf(a.id) === -1;
      });
      if (remaining2.length > 0) {
        var second = remaining2[Math.floor(Math.random() * remaining2.length)];
        added.push(second);
      }
    }

    // Handle replace flow when already have 2 attributes
    if (added.length === 0) {
      showToast('该属性已拥有，请继续尝试', 'info');
    } else if (GameState.player.douqiAttributes.length >= 2 && added.length > 0) {
      // Already have 2, need to replace
      showReplaceModal(added[0]);
      // Note: don't add directly, let replaceAttribute handle it
    } else if (added.length === 2) {
      GameState.player.douqiAttributes.push(added[0].id);
      GameState.player.douqiAttributes.push(added[1].id);
      showToast('双属性！获得 ' + added[0].name + ' + ' + added[1].name, 'success');
      updateLotteryRecord();
      recalculatePoints();
      saveToLocalStorage();
    } else if (added.length === 1) {
      GameState.player.douqiAttributes.push(added[0].id);
      showToast('获得斗气属性：' + added[0].name, 'success');
      updateLotteryRecord();
      recalculatePoints();
      saveToLocalStorage();
    }

    // Update button state
    if (btn) {
      if (GameState.player.douqiAttributes.length >= 2) {
        btn.textContent = '继续抽取 (替换)';
        btn.disabled = false;
      } else {
        btn.textContent = '抽 奖';
        btn.disabled = false;
      }
    }
  }, 4200);
}

function updateLotteryRecord() {
  var record = document.getElementById('lottery-record');
  if (!record) return;
  record.innerHTML =
    '<span style="font-size:11px;color:var(--text-muted);">已获得属性：</span>' +
    (GameState.player.douqiAttributes.length === 0 ?
      '<span style="font-size:11px;color:var(--text-dim);">暂无</span>' :
      GameState.player.douqiAttributes.map(function(aid) {
        var attr = DOUQI_ATTRS.find(function(a) { return a.id === aid; });
        return attr ? '<span class="attr-record-tag immutable" style="color:' + attr.color + ';border-color:' + attr.color + '44;background:' + attr.color + '11;" title="点击锁定/舍弃" onclick="toggleAttrLock(this,\'' + attr.id + '\')">' + attr.name + '</span>' : '';
      }).join(' '));
  // Update spin button text
  var btn = document.getElementById('wheel-spin-btn');
  if (btn) {
    btn.textContent = GameState.player.douqiAttributes.length >= 2 ? '继续抽取 (替换)' : '抽 奖';
    btn.disabled = false;
  }
}

function showReplaceModal(newAttr) {
  var existing = GameState.player.douqiAttributes;
  var html = '<h3 style="margin-bottom:12px;">选择要替换的属性</h3>' +
    '<p style="font-size:12px;color:var(--text-body);margin-bottom:16px;">新属性：<span style="color:' + newAttr.color + ';font-weight:600;">' + newAttr.name + '</span></p>' +
    '<div style="display:flex;gap:10px;">' +
    existing.map(function(aid, i) {
      var attr = DOUQI_ATTRS.find(function(a) { return a.id === aid; });
      if (!attr) return '';
      return '<button class="identity-card" style="flex:1;cursor:pointer;" onclick="replaceAttribute(' + i + ',\'' + newAttr.id + '\')">' +
        '<span style="color:' + attr.color + ';font-size:16px;font-weight:600;">' + attr.name + '</span>' +
        '</button>';
    }).join('') +
    '</div>' +
    '<button class="text-btn" style="margin-top:12px;width:100%;" onclick="closeAllModals()">取消（保留原有属性）</button>';
  showModal(html);
}

function replaceAttribute(oldIndex, newAttrId) {
  GameState.player.douqiAttributes[oldIndex] = newAttrId;
  closeAllModals();
  updateLotteryRecord();
  recalculatePoints();
  saveToLocalStorage();
  var newAttr = DOUQI_ATTRS.find(function(a) { return a.id === newAttrId; });
  showToast('已替换为：' + (newAttr ? newAttr.name : ''), 'success');
}

function toggleAttrLock(el, attrId) {
  // Cycle: normal (immutable) → locked → discard → (removed, so back to normal on next)
  if (el.classList.contains('locked')) {
    // Currently locked → discard
    var idx = GameState.player.douqiAttributes.indexOf(attrId);
    if (idx >= 0) GameState.player.douqiAttributes.splice(idx, 1);
    showToast('已舍弃属性', 'info');
    // Update spin button
    var btn = document.getElementById('wheel-spin-btn');
    if (btn) { btn.textContent = GameState.player.douqiAttributes.length >= 2 ? '继续抽取 (替换)' : '抽 奖'; btn.disabled = false; }
    updateLotteryRecord();
    recalculatePoints();
    saveToLocalStorage();
  } else if (el.classList.contains('immutable')) {
    // Normal → locked
    el.classList.add('locked');
    el.classList.remove('immutable');
    el.style.boxShadow = '0 0 8px rgba(212,168,75,0.6)';
    el.title = '已锁定（不可被替换）· 点击舍弃';
    showToast('属性已锁定，不会被替换', 'info');
  } else {
    // Locked → back to normal
    el.classList.remove('locked');
    el.classList.add('immutable');
    el.style.boxShadow = '';
    el.title = '点击锁定/舍弃';
  }
}

function toggleTalent(id, tier, el) {
  var idx = GameState.player.talents.indexOf(id);
  if (idx >= 0) {
    GameState.player.talents.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    GameState.player.talents.push(id);
    el.classList.add('selected');
  }
  recalculatePoints();
  // Update count
  var countLabel = document.querySelector('#creation-content h4');
  if (countLabel) countLabel.textContent = '天赋词条（' + GameState.player.talents.length + ' 已选）';
  saveToLocalStorage();
}

function confirmCreation() {
  var p = GameState.player;
  // Read name from input
  var nameInput = document.getElementById('input-name');
  if (nameInput) p.name = nameInput.value.trim();

  if (!p.name) { showToast('请输入姓名', 'error'); creationCurrentStep = 0; renderCreationStep0(); updateStepIndicator(); return; }
  if (!p.gender) { showToast('请选择性别', 'error'); creationCurrentStep = 0; renderCreationStep0(); updateStepIndicator(); return; }
  if (!p.difficulty) { showToast('请选择难度', 'error'); creationCurrentStep = 0; renderCreationStep0(); updateStepIndicator(); return; }
  if (!p.race) { showToast('请选择种族', 'error'); creationCurrentStep = 1; renderCreationStep1(); updateStepIndicator(); return; }
  if (!p.identity) { showToast('请选择身份', 'error'); creationCurrentStep = 2; renderCreationStep2(); updateStepIndicator(); return; }
  if (p.pointsSpent > p.points) { showToast('点数不足！请调整分配，当前超出 ' + (p.pointsSpent - p.points) + ' 点', 'error'); return; }
  startGame();
}

function startGame() {
  GameState.phase = 'game';
  showView('view-game');
  initGameWorld();
  saveToLocalStorage();
  showToast('创角完成！踏入斗气大陆...', 'success');
}

function continueGame() {
  if (!GameState.player.name || !GameState.player.race) {
    showToast('暂无有效存档，请开启新人生', 'warning');
    return;
  }
  showView('view-game');
  GameState.phase = 'game';
  initGameWorld();
  showToast('继续人生...欢迎回来，' + GameState.player.name, 'info');
}

function showModal(content) {
  var container = document.getElementById('modals-container');
  var id = 'modal-' + Date.now();
  container.innerHTML +=
    '<div class="modal-overlay" id="' + id + '" onclick="if(event.target===this)closeModal(\'' + id + '\')">' +

          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
        '</button>' +
        content +
      '</div>' +
    '</div>';
  requestAnimationFrame(function() {
    var el = document.getElementById(id);
    if (el) el.classList.add('show');
  });
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) {
    el.classList.remove('show');
    setTimeout(function() { if (el.parentNode) el.remove(); }, 250);
  }
}

function addApiForm() {
  var name = prompt('API 名称（如：OpenAI / Claude）：');
  if (!name) return;
  var url = prompt('API 地址：');
  if (!url) return;
  GameState.settings.apis = GameState.settings.apis || [];
  var api = { id: 'api-' + Date.now(), name: name, url: url };
  GameState.settings.apis.push(api);
  if (!GameState.settings.activeApi) GameState.settings.activeApi = api.id;
  showToast('API 接口已添加', 'success');
  // Refresh settings modal
  var overlays = document.querySelectorAll('.modal-overlay.show');
  overlays.forEach(function(o) { o.remove(); });
  openSettings();
}

function setActiveApi(id) {
  GameState.settings.activeApi = id;
  showToast('已切换活跃 API', 'success');
  var overlays = document.querySelectorAll('.modal-overlay.show');
  overlays.forEach(function(o) { o.remove(); });
  openSettings();
}

function removeApi(id) {
  GameState.settings.apis = GameState.settings.apis.filter(function(a) { return a.id !== id; });
  if (GameState.settings.activeApi === id) {
    GameState.settings.activeApi = GameState.settings.apis.length > 0 ? GameState.settings.apis[0].id : null;
  }
  showToast('API 接口已删除', 'info');
  var overlays = document.querySelectorAll('.modal-overlay.show');
  overlays.forEach(function(o) { o.remove(); });
  openSettings();
}

function renderApiCards() {
  var container = document.getElementById('api-cards-container');
  if (!container) return;
  GameState.settings.apis = GameState.settings.apis || [];
  if (GameState.settings.apis.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px;">暂无API接口，点击下方按钮添加</div>';
    return;
  }
  container.innerHTML = GameState.settings.apis.map(function(api) {
    var models = api.models || [];
    var lastSyncText = '';
    if (api.lastSync) {
      var d = new Date(api.lastSync);
      lastSyncText = '已同步 ' + models.length + ' 个模型 · ' + d.toLocaleString('zh-CN');
    } else if (models.length > 0) {
      lastSyncText = models.length + ' 个模型可用';
    }
    return '<div style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:6px;padding:12px;margin-bottom:8px;">' +
      '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">' +
        '<input type="text" class="form-input" placeholder="名称" value="' + (api.name || '') + '" style="flex:1;font-size:12px;padding:6px 8px;" oninput="updateApiSetting(\'' + api.id + '\',\'name\',this.value);saveToLocalStorage()">' +
        '<label class="toggle-switch">' +
          '<input type="checkbox" ' + (api.enabled !== false ? 'checked' : '') + ' onchange="toggleApiEnabled(\'' + api.id + '\',this.checked)">' +
          '<span class="toggle-slider"></span>' +
        '</label>' +
        '<button class="text-btn danger" onclick="deleteApiConfirmed(\'' + api.id + '\')" title="删除">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>' +
        '</button>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">' +
        '<input type="text" class="form-input" placeholder="接口地址" value="' + (api.url || '') + '" style="font-size:12px;padding:6px 8px;" oninput="updateApiSetting(\'' + api.id + '\',\'url\',this.value);clearModelList(\'' + api.id + '\');saveToLocalStorage()">' +
        '<div style="display:flex;gap:4px;">' +
          '<input type="password" id="api-key-' + api.id + '" class="form-input" placeholder="API Key" value="' + (api.key || '') + '" style="flex:1;font-size:12px;padding:6px 8px;" oninput="updateApiSetting(\'' + api.id + '\',\'key\',this.value);saveToLocalStorage()">' +
          '<button class="dice-btn" onclick="toggleApiKeyVisibility(\'' + api.id + '\')" title="显示/隐藏" style="padding:4px 6px;">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center;">' +
        '<input type="text" id="model-' + api.id + '" class="form-input" placeholder="模型名称" value="' + (api.model || '') + '" style="flex:1;font-size:12px;padding:6px 8px;' + (models.length > 0 ? 'display:none;' : '') + '" onchange="updateApiSetting(\'' + api.id + '\',\'model\',this.value)">' +
        '<select id="model-select-' + api.id + '" class="form-input" style="flex:1;font-size:12px;padding:6px 8px;' + (models.length > 0 ? '' : 'display:none;') + '" onchange="updateApiSetting(\'' + api.id + '\',\'model\',this.value)">' +
          '<option value="">选择模型...</option>' +
          models.map(function(m) { return '<option value="' + m + '"' + (api.model === m ? ' selected' : '') + '>' + m + '</option>'; }).join('') +
        '</select>' +
        '<button class="dice-btn" onclick="syncModels(\'' + api.id + '\')" style="font-size:10px;white-space:nowrap;">同步模型列表</button>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">' +
        '<span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">路由权重</span>' +
        '<input type="range" class="form-slider" min="0" max="100" value="' + (api.weight || 50) + '" style="flex:1;" oninput="updateApiSetting(\'' + api.id + '\',\'weight\',parseInt(this.value));this.nextElementSibling.textContent=this.value">' +
        '<span style="font-size:11px;color:var(--text-primary);min-width:28px;">' + (api.weight || 50) + '</span>' +
      '</div>' +
      '<div style="font-size:10px;">' +
        '<span id="sync-status-' + api.id + '" style="color:' + (api.lastSync ? 'var(--accent-green)' : 'var(--text-muted)') + ';">' + (lastSyncText || '尚未同步') + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function addNewApi() {
  GameState.settings.apis = GameState.settings.apis || [];
  var newApi = {
    id: 'api-' + Date.now(),
    name: '新接口',
    url: '',
    key: '',
    model: '',
    models: [],
    enabled: true,
    weight: 50,
    lastSync: null
  };
  GameState.settings.apis.push(newApi);
  if (!GameState.settings.activeApi) GameState.settings.activeApi = newApi.id;
  saveToLocalStorage();
  renderApiCards();
  showToast('API 接口已添加', 'success');
}

function updateApiSetting(apiId, field, value) {
  var api = (GameState.settings.apis || []).find(function(a) { return a.id === apiId; });
  if (!api) return;
  api[field] = value;
  saveToLocalStorage();
}

function toggleApiEnabled(apiId, checked) {
  var api = (GameState.settings.apis || []).find(function(a) { return a.id === apiId; });
  if (!api) return;
  api.enabled = checked;
  saveToLocalStorage();
}

function toggleApiKeyVisibility(apiId) {
  var input = document.getElementById('api-key-' + apiId);
  if (!input) return;
  input.type = input.type === 'password' ? 'text' : 'password';
}

function clearModelList(apiId) {
  var api = (GameState.settings.apis || []).find(function(a) { return a.id === apiId; });
  if (api) {
    api.models = [];
    saveToLocalStorage();
  }
  var select = document.getElementById('model-select-' + apiId);
  var input = document.getElementById('model-' + apiId);
  if (select) {
    select.innerHTML = '<option value="">选择模型...</option>';
    select.style.display = 'none';
  }
  if (input) { input.style.display = 'inline-block'; input.value = ''; }
}

function syncModels(apiId) {
  var api = (GameState.settings.apis || []).find(function(a) { return a.id === apiId; });
  if (!api) return;

  var url = (api.url || '').trim();
  var key = (api.key || '').trim();

  if (!url) {
    showToast('请先填写接口地址', 'error');
    return;
  }
  if (!key) {
    showToast('请先填写 API Key', 'error');
    return;
  }

  // Show loading state
  var statusEl = document.getElementById('sync-status-' + apiId);
  if (statusEl) {
    statusEl.textContent = '正在同步...';
    statusEl.style.color = 'var(--text-secondary)';
  }

  // Build the models URL
  var baseUrl = url.replace(/\/+$/, '');
  var modelsUrl = baseUrl + '/v1/models';

  // Make the real request
  fetch(modelsUrl, {
    method: 'GET',
    headers: {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json'
    }
  })
  .then(function(response) {
    if (!response.ok) {
      if (response.status === 401 || response.status === 403) {
        throw new Error('认证失败（' + response.status + '）：请检查 API Key 是否正确');
      } else if (response.status === 404) {
        throw new Error('接口未找到（404）：该地址不支持 /v1/models 端点');
      } else {
        throw new Error('请求失败（' + response.status + '）：' + response.statusText);
      }
    }
    return response.json();
  })
  .then(function(data) {
    // Parse response - handle both formats:
    // OpenAI format: { object: "list", data: [{ id, created, owned_by }] }
    // Some proxies return array directly: [{ id, ... }]
    var models = [];
    if (data && data.data && Array.isArray(data.data)) {
      models = data.data.map(function(m) { return m.id; }).filter(Boolean);
    } else if (Array.isArray(data)) {
      models = data.map(function(m) { return m.id || m.model || m; }).filter(Boolean);
    }

    if (models.length === 0) {
      throw new Error('接口返回了空模型列表，请检查接口地址是否正确');
    }

    // Update the API entry
    api.models = models;
    api.lastSync = Date.now();
    saveToLocalStorage();

    if (statusEl) {
      statusEl.textContent = '已同步 ' + models.length + ' 个模型';
      statusEl.style.color = 'var(--accent-green)';
    }

    // Re-render the API section
    renderApiCards();

    showToast('成功同步 ' + models.length + ' 个模型', 'success');
  })
  .catch(function(err) {
    console.error('Model sync error:', err);
    if (statusEl) {
      statusEl.textContent = '同步失败';
      statusEl.style.color = '#cc4444';
    }

    // Check for network errors
    if (err.message.indexOf('Failed to fetch') >= 0 || err.message.indexOf('NetworkError') >= 0) {
      showToast('网络错误：无法连接到接口地址，请检查 URL 或网络连接', 'error');
    } else if (err.message.indexOf('CORS') >= 0 || err.name === 'TypeError') {
      showToast('跨域请求被拦截：该接口可能不支持浏览器直接访问，建议使用代理', 'error');
    } else {
      showToast(err.message || '同步失败', 'error');
    }
  });
}

function initTitleParticles() {
  var canvas = document.getElementById('title-particles');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];

  function resize() {
    canvas.width = canvas.offsetWidth || window.innerWidth;
    canvas.height = canvas.offsetHeight || window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.5 - 0.1,
      opacity: Math.random() * 0.6 + 0.2
    });
  }

  function animate() {
    if (!canvas.parentNode) return;
    if (canvas.width !== canvas.offsetWidth || canvas.height !== canvas.offsetHeight) {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
      if (p.x < -10 || p.x > canvas.width + 10) { p.x = Math.random() * canvas.width; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(212,168,75,' + p.opacity + ')';
      ctx.fill();
    }
    requestAnimationFrame(animate);
  }
  animate();
}

var SAVES_KEY = 'doupo_saves';

function getSaves() {
  try {
    var raw = localStorage.getItem(SAVES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveSaves(saves) {
  try {
    localStorage.setItem(SAVES_KEY, JSON.stringify(saves));
  } catch(e) { showToast('存档存储空间不足，请清理旧存档', 'error'); }
}

function createSave() {
  var saves = getSaves();
  var save = {
    id: 'save-' + Date.now(),
    name: '存档 ' + (saves.length + 1),
    timestamp: Date.now(),
    player: JSON.parse(JSON.stringify(GameState.player)),
    settings: JSON.parse(JSON.stringify(GameState.settings))
  };
  saves.push(save);
  saveSaves(saves);
  showToast('存档成功！(' + (save.player.name || '未命名角色') + ')', 'success');
  // If save manager is open, re-render
  renderSaveList();
}

function loadSave(id) {
  var saves = getSaves();
  var save = saves.find(function(s) { return s.id === id; });
  if (!save) { showToast('存档不存在', 'error'); return; }
  GameState.player = JSON.parse(JSON.stringify(save.player));
  GameState.settings = JSON.parse(JSON.stringify(save.settings));
  // Propagate settings
  if (GameState.settings.discordConnected === undefined) {
    GameState.settings.discordConnected = false;
    GameState.settings.discordClientId = '';
  }
  saveToLocalStorage();
  closeAllModals();
  if (GameState.phase === 'game') {
    initGameWorld();
  }
  showToast('存档加载成功！欢迎回来，' + (save.player.name || '未知'), 'success');
}

function exportSave(id) {
  var saves = getSaves();
  var save = saves.find(function(s) { return s.id === id; });
  if (!save) { showToast('存档不存在', 'error'); return; }
  var playerName = (save.player.name || '未知');
  var dateStr = new Date(save.timestamp).toISOString().slice(0, 10);
  var filename = '斗破苍穹_存档_' + playerName + '_' + dateStr + '.json';
  var blob = new Blob([JSON.stringify(save, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('存档已导出：' + filename, 'success');
}

function deleteSave(id) {
  var saves = getSaves();
  var save = saves.find(function(s) { return s.id === id; });
  if (!save) return;
  if (!confirm('确定要删除存档「' + (save.name || '未命名') + '」吗？此操作不可撤销。')) return;
  saves = saves.filter(function(s) { return s.id !== id; });
  saveSaves(saves);
  showToast('存档已删除', 'info');
  renderSaveList();
}

function importSave(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var save = JSON.parse(e.target.result);
      if (!save.id || !save.player || !save.timestamp) {
        showToast('无效的存档文件格式', 'error');
        return;
      }
      var saves = getSaves();
      // Avoid duplicate IDs
      var exists = saves.find(function(s) { return s.id === save.id; });
      if (exists) {
        save.id = 'save-' + Date.now();
        save.name = (save.name || '导入存档') + ' (导入)';
      }
      saves.push(save);
      saveSaves(saves);
      showToast('存档导入成功！', 'success');
      renderSaveList();
    } catch(ex) {
      showToast('存档文件解析失败', 'error');
    }
  };
  reader.readAsText(file);
}

    if (fileInput) {
      fileInput.value = '';
      fileInput.onchange = function() { if (this.files[0]) importSave(this.files[0]); };
    }
  }, 100);
}

function renderSaveList() {
  var container = document.getElementById('save-list-container');
  if (!container) return;
  var saves = getSaves();
  container.innerHTML = renderSaveListInner(saves);
}

function renderSaveListInner(saves) {
  if (!saves || saves.length === 0) {
    return '<div class="save-empty">暂无存档</div>';
  }
  return saves.sort(function(a, b) { return b.timestamp - a.timestamp; }).map(function(save, idx) {
    var playerName = (save.player && save.player.name) || '未命名';
    var difficulty = (save.player && save.player.difficulty) || '未知';
    var race = (save.player && save.player.race) || '';
    var raceName = '';
    if (race) {
      var raceObj = RACES.find(function(r) { return r.id === race; });
      raceName = raceObj ? raceObj.name : race;
    }
    var dateStr = new Date(save.timestamp).toLocaleString('zh-CN');
    var sizeStr = JSON.stringify(save).length;
    var sizeDisplay = sizeStr > 1024 ? (sizeStr / 1024).toFixed(1) + ' KB' : sizeStr + ' B';
    return '<div class="save-entry">' +
      '<div class="save-entry-header">' +
        '<span class="save-entry-name">' + (save.name || '存档 ' + (idx + 1)) + '</span>' +
        '<span style="font-size:10px;color:var(--text-dim);">' + sizeDisplay + '</span>' +
      '</div>' +
      '<div class="save-entry-meta">' +
        '角色：' + playerName + ' · 难度：' + difficulty + ' · 种族：' + (raceName || '无') + ' · ' + dateStr +
      '</div>' +
      '<div class="save-entry-actions">' +
        '<button class="save-action-btn primary" onclick="loadSave(\'' + save.id + '\')">加载</button>' +
        '<button class="save-action-btn" onclick="exportSave(\'' + save.id + '\')">导出</button>' +
        '<button class="save-action-btn danger" onclick="deleteSave(\'' + save.id + '\')">删除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ==============================
// INIT
// ==============================

document.addEventListener('DOMContentLoaded', function() {
  initTitleParticles();
  var hasData = loadFromLocalStorage();
  var continueBtn = document.getElementById('btn-continue');
  if (continueBtn && hasData) {
    continueBtn.classList.add('primary');
    continueBtn.style.opacity = '1';
  } else if (continueBtn) {
    continueBtn.style.opacity = '0.4';
    continueBtn.style.pointerEvents = 'none';
  }
});
</script>
