<style>

/* é،¶éƒ¨ن؟،وپ¯و ?*/
#top-bar {

}

/* ه“چه؛”ه¼ڈç¼©و”¾وŒ‰é’?*/
#zoom-controls {
  position: absolute; bottom: 30px; right: 20px; z-index: 10;
  display: flex; flex-direction: column; gap: 4px;
}
.zoom-btn {

  color: #d4a84b;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.zoom-btn:hover { background: rgba(40,30,20,0.9); }

/* ه‰چه¾€ç،®è®¤ه¼¹çھ— */
#travel-dialog {
  position: absolute; z-index: 30;
  top: 50%; left: 50%;

  background: rgba(15,15,25,0.95);
  border: 2px solid rgba(212,168,75,0.5);

  color: #d4a84b;
  font-size: 14px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
  min-width: 260px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212,168,75,0.1);
}
#travel-dialog.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  pointer-events: auto;
}
#travel-dialog .td-title {
  font-size: 18px; font-weight: 700; margin-bottom: 4px;
}
#travel-dialog .td-sub {
  font-size: 11px; color: #887744; margin-bottom: 14px;
}
#travel-dialog .td-btns {
  display: flex; gap: 10px; justify-content: center;
}
.td-btn {
  padding: 8px 22px;
  border-radius: 8px;
  border: 1px solid rgba(212,168,75,0.4);
  background: rgba(30,25,15,0.9);
  color: #d4a84b;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: background 0.2s;
}
.td-btn:hover { background: rgba(60,40,20,0.9); }
.td-btn.primary {
  background: rgba(180,100,30,0.3);
  border-color: rgba(212,168,75,0.7);
}
.td-btn.primary:hover { background: rgba(200,120,40,0.4); }
</style>
</head>
<body>

<div id="app">
  <canvas id="map-canvas"></canvas>

  <div id="top-bar">
    <span class="top-tag">ًں—؛ï¸?و–—و°”ه¤§é™†</span>
    <span id="hover-name" class="top-tag" style="display:none;"></span>
  </div>

  <div id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-danger" id="tt-danger"></div>
    <div class="tt-factions" id="tt-factions"></div>
    <div id="tt-desc" style="font-size:10px;color:#998866;margin-top:4px;"></div>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-in" title="و”¾ه¤§">+</button>
    <button class="zoom-btn" id="btn-zoom-out" title="ç¼©ه°ڈ">âˆ?/button>
    <button class="zoom-btn" id="btn-reset" title="é‡چç½®è§†ه›¾" style="font-size:14px;">âŒ?/button>
  </div>

  <!-- ه‰چه¾€ç،®è®¤ه¼¹çھ— -->
  <div id="travel-dialog">
    <div class="td-title" id="td-title"></div>
    <div class="td-sub" id="td-sub"></div>
    <div class="td-btns">
      <button class="td-btn" id="td-cancel">ç•™هœ¨هژںهœ°</button>
      <button class="td-btn primary" id="td-confirm">ه‰چه¾€و­¤ه¤„</button>
    </div>
  </div>
</div>

<!-- هœ°ه›¾و•°وچ®ï¼ˆçœںه®‍و–—ç ´è‹چç©¹و•°وچ®ï¼‰ -->
<script src="assets/js/map-data.js"></script>
<!-- ه¼•و“ژ -->
<script src="assets/js/engine/MapEngine.js"></script>

<script>
(function() {

var canvas = document.getElementById('map-canvas');
var tooltip = document.getElementById('tooltip');
var hoverNameEl = document.getElementById('hover-name');

// ه¼¹çھ—ه…ƒç´ 
var travelDialog = document.getElementById('travel-dialog');
var tdTitle = document.getElementById('td-title');
var tdSub = document.getElementById('td-sub');
var tdCancel = document.getElementById('td-cancel');
var tdConfirm = document.getElementById('td-confirm');
var pendingTravel = null; // { x, y, name }

function showTravelDialog(name, x, y) {
  tdTitle.textContent = name;
  tdSub.textContent = 'وک¯هگ¦ه‰چه¾€و­¤ه¤„ï¼?;
  travelDialog.classList.add('show');
  pendingTravel = { x: x, y: y, name: name };
}

function hideTravelDialog() {
  travelDialog.classList.remove('show');
  pendingTravel = null;
}

tdCancel.addEventListener('click', hideTravelDialog);
tdConfirm.addEventListener('click', function() {
  if (!pendingTravel) return;
  engine.flyTo(pendingTravel.x, pendingTravel.y, 1.2);
  hideTravelDialog();
});

// ç‚¹ه‡»ه¼¹çھ—ه¤–ه…³é—?travelDialog.addEventListener('click', function(e) { e.stopPropagation(); });
document.getElementById('app').addEventListener('click', function(e) {
  if (travelDialog.classList.contains('show') && !travelDialog.contains(e.target)) {
    hideTravelDialog();
  }
});

// هˆ›ه»؛ه¼•و“ژ
var engine = new MapEngine(canvas, {
  worldW: 1200,
  worldH: 800,
  scale: 0.45,
  charX: 100,
  charY: 400,
  onRegionClick: function(regionId) {
    var region = MAP_REGIONS.find(function(r) { return r.id === regionId; });
    if (!region || !region.polygon) return;
    // è®،ç®—هŒ؛هںںن¸­ه؟ƒ
    var cx = 0, cy = 0;
    for (var i = 0; i < region.polygon.length; i++) {
      cx += region.polygon[i][0];
      cy += region.polygon[i][1];
    }
    cx /= region.polygon.length;
    cy /= region.polygon.length;

    // ه°ڈن؛؛èµ°è؟‡هژ?    engine.walkTo(cx, cy, function() {
      showTravelDialog(region.name, cx, cy);
    });
  },
  onSubClick: function(sub) {
    engine.walkTo(sub.pos[0], sub.pos[1], function() {
      showTravelDialog(sub.name, sub.pos[0], sub.pos[1]);
    });
  },
  onHoverChange: function(regionId) {
    updateTooltip(regionId);
  }
});

// هٹ è½½çœںه®‍و•°وچ®
engine.setRegions(MAP_REGIONS);
engine.setSubLocations(MAP_SUB_LOCATIONS);
engine.setTerrain(MAP_TERRAIN);

// هˆ‌ه§‹هŒ–è§†هڈ?engine.fitToScreen();

// ç¼©و”¾وŒ‰é’®
document.getElementById('btn-zoom-in').addEventListener('click', function() {
  engine.zoomAt(1.15, canvas.width / 2, canvas.height / 2);
});
document.getElementById('btn-zoom-out').addEventListener('click', function() {
  engine.zoomAt(0.85, canvas.width / 2, canvas.height / 2);
});
document.getElementById('btn-reset').addEventListener('click', function() {
  engine.fitToScreen();
});

// é”®ç›که؟«وچ·é”?window.addEventListener('keydown', function(e) {
  if (e.key === '+' || e.key === '=') {
    engine.zoomAt(1.15, canvas.width / 2, canvas.height / 2);
  } else if (e.key === '-') {
    engine.zoomAt(0.85, canvas.width / 2, canvas.height / 2);
  } else if (e.key === '0') {
    engine.fitToScreen();
  }
});

// و‚¬هپœوڈگç¤؛
var ttName = document.getElementById('tt-name');
var ttDanger = document.getElementById('tt-danger');
var ttFactions = document.getElementById('tt-factions');
var ttDesc = document.getElementById('tt-desc');

function updateTooltip(regionId) {
  if (!regionId) {
    tooltip.classList.remove('show');
    hoverNameEl.style.display = 'none';
    return;
  }
  var region = MAP_REGIONS.find(function(r) { return r.id === regionId; });
  if (!region) return;

  ttName.textContent = region.name;
  ttDanger.textContent = 'هچ±é™©: ' + (region.danger || '?') + ' آ· èƒ½é‡ڈ: ' + (region.energy || '?');
  ttFactions.textContent = region.factions || '';
  ttDesc.textContent = region.desc || '';

  var screen = engine.toScreen(
    region.polygon.reduce(function(a, p) { return a + p[0]; }, 0) / region.polygon.length,
    region.polygon.reduce(function(a, p) { return a + p[1]; }, 0) / region.polygon.length
  );
  tooltip.style.left = (screen.x + 15) + 'px';
  tooltip.style.top = (screen.y - 10) + 'px';
  tooltip.classList.add('show');

  hoverNameEl.style.display = 'block';
  hoverNameEl.textContent = region.name;
}

// è؟½è¸ھé¼ و ‡و›´و–° tooltip ن½چç½®
canvas.addEventListener('mousemove', function(e) {
  if (!engine.hoveredId) return;
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  tooltip.style.left = (mx + 18) + 'px';
  tooltip.style.top = (my - 10) + 'px';
});

console.log('[Map] و–—ç ´è‹چç©¹آ·و–—و°”ه¤§é™†هœ°ه›¾ه·²ه°±ç»ھم€‚و‹–و‹½ه¹³ç§?آ· و»ڑè½®ç¼©و”¾ آ· هڈŒه‡»èپڑç„¦ آ· ç‚¹ه‡»هŒ؛هںںم€?);
})();
</script>
