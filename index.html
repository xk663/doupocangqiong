<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>斗破苍穹 · 修炼模拟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
<style>
/* === CSS Custom Properties === */
:root {
  --bg-deep: #050508;
  --bg-panel: #0a0a12;
  --bg-card: #0d0d18;
  --bg-hover: #111122;
  --border-subtle: #1a1a2e;
  --border-gold: #d4a84b44;
  --border-gold-bright: #d4a84b88;
  --text-primary: #d4a84b;
  --text-secondary: #887744;
  --text-body: #aaa;
  --text-muted: #665533;
  --text-dim: #444;
  --accent-fire: #ff6b35;
  --accent-purple: #c084fc;
  --accent-green: #88cc88;
  --accent-blue: #4488ff;
  --accent-ice: #88cccc;
  --accent-thunder: #cccc44;
  --accent-light: #ccaa44;
  --accent-dark: #886688;
  --accent-metal: #ccaa44;
  --accent-poison: #88aa44;
  --accent-space: #ccaadd;
  --font-serif: 'Noto Serif SC', serif;
  --font-sans: 'Noto Sans SC', sans-serif;
  --sidebar-width: 72px;
  --transition-fast: 150ms ease-out;
  --transition-normal: 250ms ease-out;
  --transition-slow: 400ms ease-out;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-gold: 0 0 20px rgba(212,168,75,0.15);
  --z-sidebar: 100;
  --z-modal: 200;
  --z-toast: 300;
  --z-llm: 250;
}

/* === Reset === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-sans);color:var(--text-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(212,168,75,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(192,132,252,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 100%, rgba(255,107,53,0.03) 0%, transparent 50%),
    var(--bg-deep);
}
button{border:none;outline:none;cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:2px}

/* === Typography === */
h1,h2,h3,h4{font-family:var(--font-serif);color:var(--text-primary);font-weight:600}
.serif{font-family:var(--font-serif)}
.text-gold{color:var(--text-primary)}
.text-muted{color:var(--text-muted)}
.text-body{color:var(--text-body)}

/* === View Container Base === */
.view{position:absolute;top:0;left:0;width:100%;height:100%;display:none;overflow:hidden;transition:opacity var(--transition-normal);opacity:0}
.view.active{display:flex;opacity:1}

/* === Title Screen === */

/* Dynamic cover image layer */
.title-cover-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  overflow: hidden; z-index: 0;
}
.title-cover-video {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 1;
}
/* Dark gradient overlay on top of image */
.title-cover-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at center, transparent 50%, rgba(5,5,8,0.15) 80%, rgba(5,5,8,0.4) 100%);
  pointer-events: none;
}
.title-cover-vignette {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  box-shadow: inset 0 0 80px rgba(5,5,8,0.25), inset 0 0 20px rgba(0,0,0,0.15);
  pointer-events: none;
}

@keyframes cover-drift {
  0% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(-1.5%, -0.5%) scale(1.04); }
  50% { transform: translate(0.8%, -1.2%) scale(1.02); }
  75% { transform: translate(-0.5%, 0.8%) scale(1.05); }
  100% { transform: translate(1.2%, -0.3%) scale(1.03); }
}
@keyframes cover-breathe {
  0%, 100% { opacity: 0.68; }
  50% { opacity: 0.78; }
}
@keyframes cover-breathe-video {
  0%, 100% { opacity: 0.74; }
  50% { opacity: 0.82; }
}

.title-btn {
  width: 240px;
  padding: 12px 0;
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-body);
  font-family: var(--font-serif);
  font-size: 15px;
  letter-spacing: 4px;
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}
.title-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,168,75,0.05), transparent);
  transition: left 0.5s ease;
}
.title-btn:hover::before { left: 100%; }
.title-btn:hover {
  border-color: var(--border-gold-bright);
  color: var(--text-primary);
  box-shadow: var(--shadow-gold);
}
.title-btn.primary {
  border-color: var(--border-gold);
  color: var(--text-primary);
}
.title-btn.primary:hover {
  border-color: var(--text-primary);
  box-shadow: 0 0 30px rgba(212,168,75,0.25);
}

/* === Creation Steps === */
.step-indicator {
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 16px;transition:all var(--transition-normal);
}
.step-indicator .step-num {
  font-family:var(--font-serif);font-size:20px;color:var(--text-dim);
}
.step-indicator .step-label {
  font-size:11px;color:var(--text-dim);
}
.step-indicator.active .step-num { color: var(--text-primary); }
.step-indicator.active .step-label { color: var(--text-secondary); }
.step-indicator.done .step-num { color: var(--text-secondary); }
.step-indicator.done .step-label { color: var(--text-secondary); }
.step-line {
  width:40px;height:1px;background:var(--border-subtle);align-self:center;transition:background var(--transition-normal);
}
.step-line.done { background: var(--border-gold-bright); }
.creation-nav-btn {
  padding:10px 32px;background:transparent;border:1px solid var(--border-subtle);
  color:var(--text-body);font-family:var(--font-serif);font-size:14px;
  letter-spacing:4px;transition:all var(--transition-normal);
}
.creation-nav-btn:hover { border-color:var(--border-gold-bright);color:var(--text-primary); }
.creation-nav-btn.primary { border-color:var(--border-gold);color:var(--text-primary); }

/* === Form Elements === */
.form-group { margin-bottom:20px; }
.form-label { display:block;font-family:var(--font-serif);color:var(--text-secondary);font-size:13px;margin-bottom:8px;letter-spacing:2px; }
.form-input {
  width:100%;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);font-size:14px;border-radius:4px;transition:border-color var(--transition-fast);
}
.form-input:focus { border-color:var(--border-gold-bright); }
.form-slider {
  -webkit-appearance:none;width:100%;height:4px;background:var(--border-subtle);border-radius:2px;outline:none;
}
.form-slider::-webkit-slider-thumb {
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--text-primary);cursor:pointer;
  box-shadow:0 0 8px rgba(212,168,75,0.4);
}
.option-group { display:flex;gap:8px; }
.option-btn {
  flex:1;padding:10px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);text-align:center;transition:all var(--transition-fast);
}
.option-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }
.option-btn.selected { border-color:var(--text-primary);color:var(--text-primary);background:rgba(212,168,75,0.08); }
.difficulty-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);padding:12px;
  border-radius:6px;cursor:pointer;transition:all var(--transition-fast);
}
.difficulty-card:hover { border-color:var(--border-gold-bright);transform:translateY(-1px); }
.difficulty-card.selected { border-color:var(--text-primary)!important;background:rgba(212,168,75,0.05); }
.dice-btn {
  background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-secondary);
  padding:8px 12px;border-radius:4px;transition:all var(--transition-fast);
}
.dice-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }

/* === Race & Identity Cards === */
.race-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  padding:14px;border-radius:6px;cursor:pointer;
  transition:all var(--transition-normal);
}
.race-card:hover { transform:translateY(-2px);border-color:var(--border-gold);box-shadow:var(--shadow-gold); }
.race-card.selected { border-color:var(--text-primary)!important;background:rgba(212,168,75,0.05); }
.identity-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  padding:20px;border-radius:6px;cursor:pointer;text-align:center;
  transition:all var(--transition-normal);
}
.identity-card:hover { transform:translateY(-2px);border-color:var(--border-gold); }
.identity-card.selected { border-color:var(--text-primary)!important;background:rgba(212,168,75,0.05); }

/* === Stats === */
.stat-row { margin-bottom:12px; }

/* === Talents & Attributes === */
.talent-chip {
  padding:5px 12px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);font-size:12px;border-radius:16px;cursor:pointer;
  transition:all var(--transition-fast);
}
.talent-chip:hover { border-color:var(--border-gold); }
.talent-chip.selected { background:rgba(212,168,75,0.1);border-color:var(--text-primary);color:var(--text-primary); }
.attr-chip {
  padding:8px 20px;background:var(--bg-card);border:1px solid var(--border-subtle);
  font-family:var(--font-serif);font-size:14px;border-radius:6px;cursor:pointer;
  transition:all var(--transition-fast);
}
.attr-chip:hover { border-color:var(--border-gold-bright); }
.attr-chip.selected {
  border-color: var(--text-primary) !important;
  background: rgba(212,168,75,0.15) !important;
  box-shadow: 0 0 12px rgba(212,168,75,0.25);
}

/* === Game View Gold Frame === */
#view-game {
  border:2px solid rgba(212,168,75,0.25);
  box-shadow:
    inset 0 0 80px rgba(212,168,75,0.04),
    0 0 40px rgba(212,168,75,0.08),
    0 0 4px rgba(212,168,75,0.2);
  border-radius:4px;
  overflow:hidden;
}

/* === Sidebar === */
#game-sidebar {
  background:
    radial-gradient(circle at 50% 20%, rgba(212,168,75,0.04) 0%, transparent 70%),
    linear-gradient(180deg, #0a0a16 0%, #0c0c1a 40%, #0a0a12 100%);
  border-right:1px solid rgba(212,168,75,0.15);
  box-shadow:2px 0 20px rgba(0,0,0,0.3);
}
.sidebar-btn {
  width:48px;height:52px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:transparent;color:var(--text-dim);
  border-radius:10px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);gap:2px;position:relative;
  overflow:visible;
}
.sidebar-btn::before {
  content:'';position:absolute;inset:0;border-radius:10px;
  background:radial-gradient(circle at center, rgba(212,168,75,0.12) 0%, transparent 70%);
  opacity:0;transition:opacity 0.3s ease;
}
.sidebar-btn:hover { color:var(--text-secondary);transform:translateY(-1px); }
.sidebar-btn:hover::before { opacity:1; }
.sidebar-btn.active {
  color:var(--text-primary);
  background:linear-gradient(180deg, rgba(212,168,75,0.1) 0%, rgba(212,168,75,0.03) 100%);
  box-shadow:0 0 16px rgba(212,168,75,0.12), inset 0 1px 0 rgba(212,168,75,0.08);
}
.sidebar-btn.active::after {
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:3px;background:var(--text-primary);border-radius:0 2px 2px 0;
  box-shadow:0 0 10px rgba(212,168,75,0.6);
  animation:sidebar-glow 2s ease-in-out infinite;
}
@keyframes sidebar-glow {
  0%,100% { box-shadow:0 0 8px rgba(212,168,75,0.4); }
  50% { box-shadow:0 0 16px rgba(212,168,75,0.8), 0 0 24px rgba(212,168,75,0.3); }
}
.sidebar-btn svg { transition:all 0.3s ease; }
.sidebar-btn.active svg { filter:drop-shadow(0 0 4px rgba(212,168,75,0.5)); }
.sidebar-label { font-size:9px;letter-spacing:1px;font-family:var(--font-serif);opacity:0.75; }
.sidebar-btn.active .sidebar-label { opacity:1; }
.game-subview { display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto; }
.game-subview.active { display:flex;flex-direction:column; animation:fadeIn 0.25s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }

/* === World Map === */
.map-region {
  position:absolute;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all var(--transition-normal);
}
.map-region:hover {
  transform:scale(1.08);
  filter:brightness(1.3);
  z-index:10;
  box-shadow:0 0 20px rgba(212,168,75,0.3);
}
.map-region.player-location {
  animation:player-region-glow 2s infinite;
}
@keyframes player-region-glow {
  0%,100% { box-shadow:0 0 8px rgba(80,160,80,0.3); }
  50% { box-shadow:0 0 20px rgba(80,160,80,0.6); }
}
.map-region.danger { }
.player-marker {
  width:6px;height:6px;background:var(--text-primary);border-radius:50%;
  position:absolute;top:-3px;left:50%;box-shadow:0 0 10px var(--text-primary);
  animation:marker-pulse 2s infinite;
}
@keyframes marker-pulse {
  0%,100% { box-shadow:0 0 6px var(--text-primary); }
  50% { box-shadow:0 0 16px var(--text-primary),0 0 24px rgba(212,168,75,0.5); }
}
.region-label {
  font-family:var(--font-serif);font-size:11px;color:var(--text-secondary);
  pointer-events:none;
}

/* === Studio === */
.studio-room {
  position:absolute;width:120px;height:80px;
  background:var(--bg-card);border:1px solid var(--border-gold);
  border-radius:6px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  cursor:pointer;transition:all var(--transition-normal);
  transform:translate(-50%,-50%);
}
.studio-room:hover { box-shadow:var(--shadow-gold);transform:translate(-50%,-50%) translateY(-2px); }
.room-name { color:var(--text-primary);font-family:var(--font-serif);font-size:13px; }
.room-status { color:var(--text-muted);font-size:10px; }
.expand-btn {
  position:absolute;padding:4px 10px;background:transparent;
  border:1px dashed var(--border-subtle);color:var(--text-dim);
  font-size:10px;font-family:var(--font-serif);cursor:pointer;
  transform:translate(-50%,-50%);transition:all var(--transition-normal);
}
.expand-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }

/* === Personnel === */
.char-avatar {
  width:48px;height:48px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  background:linear-gradient(135deg,var(--bg-hover),var(--bg-card));
  border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;
}
.char-avatar span {
  font-family:var(--font-serif);font-size:18px;color:var(--text-primary);
}
.personnel-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  padding:16px;border-radius:8px;cursor:pointer;
  transition:all var(--transition-normal);
}
.personnel-card:hover { border-color:var(--border-gold);transform:translateY(-2px);box-shadow:var(--shadow-gold); }

/* === Modal === */
.modal-overlay {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:var(--z-modal);opacity:0;transition:opacity var(--transition-normal);
  pointer-events:none;
}
.modal-overlay.show { opacity:1;pointer-events:all; }
.modal-content {
  background:var(--bg-panel);border:1px solid var(--border-gold);
  border-radius:8px;padding:24px;min-width:360px;max-width:560px;
  max-height:80vh;overflow-y:auto;position:relative;
  transform:scale(0.95);transition:transform var(--transition-normal);
}
.modal-overlay.show .modal-content { transform:scale(1); }
.modal-close {
  position:absolute;top:12px;right:12px;background:transparent;
  color:var(--text-dim);padding:4px;border-radius:4px;transition:all var(--transition-fast);
}
.modal-close:hover { color:var(--text-primary);background:rgba(212,168,75,0.1); }

/* === Toggle === */
.toggle-switch { position:relative;display:inline-block;width:40px;height:22px; }
.toggle-switch input { opacity:0;width:0;height:0; }
.toggle-slider {
  position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:22px;transition:all var(--transition-fast);
}
.toggle-slider::before {
  content:'';position:absolute;height:16px;width:16px;left:2px;bottom:2px;
  background:var(--text-dim);border-radius:50%;transition:all var(--transition-fast);
}
input:checked + .toggle-slider { border-color:var(--border-gold);background:rgba(212,168,75,0.1); }
input:checked + .toggle-slider::before { background:var(--text-primary);transform:translateX(18px); }
.add-api-btn {
  width:100%;padding:8px;background:transparent;border:1px dashed var(--border-subtle);
  color:var(--text-muted);font-family:var(--font-serif);font-size:12px;
  border-radius:4px;cursor:pointer;transition:all var(--transition-fast);
}
.add-api-btn:hover { border-color:var(--border-gold);color:var(--text-primary); }
.text-btn { background:transparent;border:none;color:var(--text-secondary);font-size:11px;cursor:pointer; }
.text-btn:hover { color:var(--text-primary); }
.text-btn.danger { color:#883333; }
.text-btn.danger:hover { color:#cc4444; }

/* === LLM Chat === */
.llm-pulse {
  position:absolute;width:100%;height:100%;border-radius:50%;
  border:1px solid var(--border-gold);animation:llm-pulse 2s infinite;
}
@keyframes llm-pulse {
  0%,100% { transform:scale(1);opacity:0.3; }
  50% { transform:scale(1.3);opacity:1; }
}
.msg { padding:8px 12px;border-radius:8px;font-size:12px;max-width:85%;line-height:1.5; }
.msg.ai { background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-body);align-self:flex-start;border-left:2px solid #888; }
.msg.user { background:rgba(212,168,75,0.08);border:1px solid var(--border-gold);color:var(--text-primary);align-self:flex-end;border-right:2px solid var(--text-primary); }
.msg.typing::after { content:'▍';animation:blink 0.6s infinite;color:var(--text-primary); }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
.quick-cmd {
  padding:4px 10px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-secondary);font-size:10px;border-radius:12px;cursor:pointer;transition:all var(--transition-fast);
}
.quick-cmd:hover { border-color:var(--border-gold);color:var(--text-primary); }

/* === Toast === */
@keyframes toast-in { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
@keyframes toast-out { from{transform:translateX(0);opacity:1;} to{transform:translateX(100%);opacity:0;} }

/* === Selection === */
::selection { background: rgba(212,168,75,0.3);color: var(--text-primary); }

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* === Save Manager === */
.save-entry {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 6px; padding: 14px; margin-bottom: 8px;
  transition: all var(--transition-normal);
}
.save-entry:hover { border-color: var(--border-gold); }
.save-entry-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
}
.save-entry-name { color: var(--text-primary); font-family: var(--font-serif); font-size: 14px; font-weight: 600; }
.save-entry-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.save-entry-actions { display: flex; gap: 6px; }
.save-action-btn {
  padding: 4px 12px; background: var(--bg-card); border: 1px solid var(--border-subtle);
  color: var(--text-secondary); font-size: 11px; border-radius: 4px; cursor: pointer;
  transition: all var(--transition-fast);
}
.save-action-btn:hover { border-color: var(--border-gold); color: var(--text-primary); }
.save-action-btn.danger { color: #883333; }
.save-action-btn.danger:hover { border-color: #cc4444; color: #cc4444; }
.save-action-btn.primary { color: var(--accent-green); border-color: var(--accent-green)33; }
.save-action-btn.primary:hover { border-color: var(--accent-green); }
.save-empty { text-align: center; color: var(--text-dim); padding: 40px; font-size: 13px; }

/* === Lottery Wheel === */
.lottery-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
.wheel-wrapper {
  position: relative;
  width: 320px;
  height: 320px;
}
.wheel-canvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  box-shadow: 0 0 30px rgba(212,168,75,0.2), 0 0 60px rgba(212,168,75,0.1);
}
.wheel-pointer {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid var(--text-primary);
  filter: drop-shadow(0 0 6px rgba(212,168,75,0.6));
  z-index: 5;
}
.wheel-center-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: var(--bg-panel);
  border: 2px solid var(--border-gold);
  color: var(--text-primary);
  font-family: var(--font-serif);
  font-size: 14px;
  cursor: pointer;
  z-index: 5;
  transition: all var(--transition-fast);
}
.wheel-center-btn:hover {
  border-color: var(--text-primary);
  box-shadow: 0 0 20px rgba(212,168,75,0.4);
}
.wheel-center-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.lottery-result {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  font-family: var(--font-serif);
  font-size: 13px;
  animation: result-pop 0.5s ease-out;
}
@keyframes result-pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.attr-record-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 12px;
  font-family: var(--font-serif);
  font-size: 13px;
  border: 1px solid;
}

/* === Settings Side Panel === */
.settings-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
  z-index: calc(var(--z-modal) - 6); opacity: 0; transition: opacity 0.3s ease;
  pointer-events: none;
}
.settings-overlay.show { opacity: 1; pointer-events: all; }

.settings-panel {
  position: fixed; top: 0; right: 0; height: 100vh; width: 94vw;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(212,168,75,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(192,132,252,0.03) 0%, transparent 50%),
    linear-gradient(180deg, #0a0a16 0%, #0c0c1c 30%, #0a0a12 100%);
  border-left: 2px solid rgba(212,168,75,0.25);
  box-shadow: -4px 0 60px rgba(0,0,0,0.5), -1px 0 0 rgba(212,168,75,0.1);
  z-index: calc(var(--z-modal) - 5);
  display: flex; flex-direction: row;
  transform: translateX(40px); opacity: 0;
  transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1), opacity 0.3s ease;
  pointer-events: all;
}
.settings-overlay.show + .settings-panel,
.settings-panel.show {
  transform: translateX(0); opacity: 1;
}

/* Settings vertical tab sidebar */
.settings-tab-sidebar {
  width: 72px; min-width: 72px;
  background:
    linear-gradient(180deg, rgba(10,10,22,1) 0%, rgba(12,12,28,1) 50%, rgba(10,10,20,1) 100%);
  border-right: 1px solid rgba(212,168,75,0.12);
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 0; gap: 2px;
  overflow-y: auto;
}
.settings-tab-btn {
  width: 58px; height: 58px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  background: transparent; border: none; color: var(--text-dim);
  border-radius: 10px; cursor: pointer; transition: all 0.25s ease;
  position: relative;
}
.settings-tab-btn svg { width: 22px; height: 22px; transition: all 0.25s ease; }
.settings-tab-btn .stab-label {
  font-size: 12px; font-family: var(--font-serif); letter-spacing: 1px;
  opacity: 0.7; transition: opacity 0.25s ease;
}
.settings-tab-btn:hover { color: var(--text-secondary); background: rgba(212,168,75,0.04); }
.settings-tab-btn:hover .stab-label { opacity: 1; }
.settings-tab-btn.active {
  color: var(--text-primary);
  background: linear-gradient(180deg, rgba(212,168,75,0.12) 0%, rgba(212,168,75,0.03) 100%);
  box-shadow: 0 0 14px rgba(212,168,75,0.1);
}
.settings-tab-btn.active::before {
  content: ''; position: absolute; left: 0; top: 10px; bottom: 10px;
  width: 3px; background: var(--text-primary); border-radius: 0 2px 2px 0;
  box-shadow: 0 0 10px rgba(212,168,75,0.5);
  animation: settings-tab-glow 2.5s ease-in-out infinite;
}
@keyframes settings-tab-glow {
  0%,100% { box-shadow: 0 0 6px rgba(212,168,75,0.4); }
  50% { box-shadow: 0 0 14px rgba(212,168,75,0.7), 0 0 20px rgba(212,168,75,0.3); }
}
.settings-tab-btn.active svg { filter: drop-shadow(0 0 5px rgba(212,168,75,0.4)); }
.settings-tab-btn.active .stab-label { opacity: 1; }

/* Settings content area */
.settings-content-area {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.settings-content-header {
  padding: 16px 24px; border-bottom: 1px solid rgba(212,168,75,0.1);
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(10,10,20,0.6);
}
.settings-content-header h3 {
  font-family: var(--font-serif); color: var(--text-primary);
  font-size: 18px; letter-spacing: 4px; margin: 0;
}
.settings-close-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid rgba(212,168,75,0.15);
  color: var(--text-dim); border-radius: 50%; cursor: pointer;
  transition: all var(--transition-fast);
}
.settings-close-btn:hover {
  color: var(--text-primary); border-color: var(--border-gold-bright);
  box-shadow: 0 0 12px rgba(212,168,75,0.2);
}
.settings-content-body {
  flex: 1; overflow-y: auto; padding: 28px 40px 28px 32px;
}
.settings-content-body::-webkit-scrollbar { width: 5px; }
.settings-content-body::-webkit-scrollbar-thumb { background: rgba(212,168,75,0.12); border-radius: 3px; }

/* Settings section heading */
.settings-section-title {
  font-family: var(--font-serif); color: var(--text-primary);
  font-size: 18px; margin-bottom: 20px; letter-spacing: 4px;
  padding-bottom: 12px; border-bottom: 1px solid rgba(212,168,75,0.12);
  display: flex; align-items: center; gap: 12px;
}
.settings-section-title::before {
  content: ''; width: 5px; height: 22px; background: var(--text-primary);
  border-radius: 2px; box-shadow: 0 0 10px rgba(212,168,75,0.4);
}

/* Settings card (reusable) */
.settings-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 8px; padding: 18px; margin-bottom: 14px;
  transition: all var(--transition-normal);
  font-size: 14px;
}
.settings-card:hover { border-color: rgba(212,168,75,0.2); }
.settings-card.active-card {
  border-color: var(--border-gold);
  background: rgba(212,168,75,0.04);
}

/* Settings form refinements */
.settings-form-label {
  display: block; font-family: var(--font-serif); color: var(--text-secondary);
  font-size: 14px; margin-bottom: 8px; letter-spacing: 2px;
}
.settings-form-input {
  width: 100%; padding: 10px 14px; background: rgba(10,10,20,0.6);
  border: 1px solid var(--border-subtle); color: var(--text-body);
  font-size: 15px; border-radius: 6px; transition: border-color var(--transition-fast);
}
.settings-form-input:focus { border-color: var(--border-gold-bright); }
.settings-textarea {
  resize: vertical; font-size: 14px; min-height: 80px;
}

/* Settings action button */
.settings-action-btn {
  width: 100%; padding: 12px; background: rgba(212,168,75,0.06);
  border: 1px dashed rgba(212,168,75,0.2); color: var(--text-primary);
  font-family: var(--font-serif); font-size: 15px; letter-spacing: 3px;
  border-radius: 6px; cursor: pointer; transition: all var(--transition-fast);
  margin-top: 8px;
}
.settings-action-btn:hover {
  background: rgba(212,168,75,0.1); border-color: var(--border-gold);
  box-shadow: 0 0 16px rgba(212,168,75,0.1);
}
.settings-action-btn.danger {
  border-color: rgba(200,60,60,0.2); color: #aa5555;
}
.settings-action-btn.danger:hover { border-color: rgba(200,60,60,0.5); color: #cc6666; }

/* Settings card grid for API cards */
.settings-card-grid {
  display: flex; flex-direction: column; gap: 8px;
}

/* Protocol cards */
.settings-card .toggle-switch { transform: scale(0.75); transform-origin: center; }

/* Settings label chip */
.settings-label-chip {
  display: inline-block; padding: 2px 8px; background: rgba(212,168,75,0.08);
  border: 1px solid rgba(212,168,75,0.15); border-radius: 10px;
  font-size: 10px; color: var(--text-secondary); letter-spacing: 1px;
}

/* === Player Summary === */
.summary-container { display:flex;flex-direction:column;height:100%; }
.summary-header {
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;background:var(--bg-panel);border-bottom:1px solid var(--border-subtle);
}
.summary-tabs {
  display:flex;gap:2px;padding:0 20px;background:var(--bg-panel);
  border-bottom:1px solid var(--border-subtle);overflow-x:auto;flex-shrink:0;
}
.summary-tab {
  padding:8px 16px;background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);font-family:var(--font-serif);font-size:12px;
  cursor:pointer;transition:all var(--transition-fast);white-space:nowrap;
}
.summary-tab:hover { color:var(--text-secondary); }
.summary-tab.active { color:var(--text-primary);border-bottom-color:var(--text-primary); }
.summary-body {
  flex:1;overflow-y:auto;padding:20px;
}
.summary-section { margin-bottom:24px; }
.summary-section h4 {
  color:var(--text-primary);margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid var(--border-subtle);font-size:14px;letter-spacing:2px;
}
.summary-kv { display:flex;padding:6px 0;border-bottom:1px solid var(--border-subtle); }
.summary-kv .key { color:var(--text-secondary);width:100px;font-size:12px;flex-shrink:0; }
.summary-kv .val { color:var(--text-body);font-size:13px; }

/* Economy / Currency */
.currency-row {
  display:flex;gap:16px;align-items:center;padding:10px 0;
}
.currency-badge {
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:var(--bg-card);border:1px solid var(--border-gold);
  border-radius:6px;font-family:var(--font-serif);
}
.currency-badge.gold { border-color:#d4a84b88; }
.currency-badge.silver { border-color:#aaaaaa88; }
.currency-badge.copper { border-color:#cc884488; }
.currency-badge.spirit { border-color:#c084fc88; }
.currency-icon { font-size:16px; }
.currency-value { font-size:16px;font-weight:600; }

/* Desire Bars (传奇血条风格) */
.desire-bar-container {
  margin-bottom:14px;
}
.desire-bar-label {
  display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;
}
.desire-bar-track {
  width:100%;height:18px;background:#0a0a0a;border:1px solid var(--border-subtle);
  border-radius:2px;overflow:hidden;position:relative;
}
.desire-bar-fill {
  height:100%;transition:width 0.8s ease-out;position:relative;
}
.desire-bar-fill.lust {
  background:linear-gradient(90deg,#4a1020,#cc2244 30%,#ff6644 60%,#d4a84b 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.15);
}
.desire-bar-fill.pleasure {
  background:linear-gradient(90deg,#1a1040,#aa44cc 30%,#ee88ff 60%,#ffaadd 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.15);
}
.desire-bar-value {
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  font-size:10px;color:#fff;font-family:var(--font-serif);text-shadow:0 1px 2px rgba(0,0,0,0.8);
}

/* Body Part Card */
.bodypart-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:8px;padding:12px;margin-bottom:8px;
}
.bodypart-card .part-name {
  color:var(--text-primary);font-family:var(--font-serif);font-size:14px;margin-bottom:8px;
}
.bodypart-grid { display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px; }
.bodypart-grid .bp-label { color:var(--text-muted); }
.bodypart-grid .bp-value { color:var(--text-body); }
.reaction-tier {
  display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;
}
.reaction-tier.low { background:rgba(100,180,100,0.15);color:#88cc88;border:1px solid #88cc8844; }
.reaction-tier.medium { background:rgba(200,180,60,0.15);color:#cccc44;border:1px solid #cccc4444; }
.reaction-tier.high { background:rgba(220,100,100,0.15);color:#ff6644;border:1px solid #ff664444; }

/* Sensitive Zones */
.sensitive-tag {
  display:inline-block;padding:4px 12px;margin:3px;
  background:rgba(212,168,75,0.08);border:1px solid var(--border-gold);
  border-radius:12px;font-size:11px;color:var(--text-primary);
}

/* Inventory Grid */
.inv-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px; }
.inv-slot {
  aspect-ratio:1;background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:6px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;cursor:pointer;transition:all var(--transition-fast);
  position:relative;
}
.inv-slot:hover { border-color:var(--border-gold); }
.inv-slot .inv-count {
  position:absolute;top:4px;right:6px;font-size:10px;color:var(--text-secondary);
}
.inv-slot .inv-name { font-size:10px;color:var(--text-body);text-align:center; }

/* Equipment Slots */
.equip-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px; }
.equip-slot {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:8px;padding:14px;min-height:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:all var(--transition-fast);
}
.equip-slot:hover { border-color:var(--border-gold); }
.equip-slot.equipped { border-color:var(--border-gold);background:rgba(212,168,75,0.05); }
.equip-slot .slot-label { font-size:10px;color:var(--text-muted); }
.equip-slot .slot-item { font-size:13px;color:var(--text-primary);font-family:var(--font-serif); }

/* Skill Card */
.skill-card {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:8px;padding:14px;margin-bottom:8px;
}
.skill-card .skill-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:6px; }
.skill-card .skill-name { color:var(--text-primary);font-family:var(--font-serif);font-size:14px; }
.skill-card .skill-grade { font-size:10px;padding:2px 8px;border-radius:10px; }
.skill-card .skill-desc { font-size:11px;color:var(--text-body);margin-bottom:6px; }
.skill-mastery-track {
  width:100%;height:4px;background:var(--bg-deep);border-radius:2px;overflow:hidden;
}
.skill-mastery-fill {
  height:100%;background:var(--text-primary);border-radius:2px;
  transition:width var(--transition-normal);
}

/* Relationship Card */
.rel-card {
  display:flex;align-items:center;gap:12px;background:var(--bg-card);
  border:1px solid var(--border-subtle);border-radius:8px;padding:12px;margin-bottom:8px;
}
.rel-card .rel-avatar {
  width:40px;height:40px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  background:linear-gradient(135deg,var(--bg-hover),var(--bg-card));
  border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-serif);color:var(--text-primary);font-size:14px;flex-shrink:0;
}
.rel-card .rel-info { flex:1; }
.rel-card .rel-name { color:var(--text-primary);font-size:13px;font-weight:600; }
.rel-card .rel-status { font-size:10px; }
.rel-affinity-bar {
  width:100%;height:3px;background:var(--bg-deep);border-radius:2px;margin-top:4px;overflow:hidden;
}
.rel-affinity-fill { height:100%;border-radius:2px; }

/* Timeline */
.timeline { position:relative;padding-left:24px; }
.timeline::before {
  content:'';position:absolute;left:8px;top:0;bottom:0;
  width:1px;background:var(--border-gold);
}
.timeline-entry { position:relative;margin-bottom:16px; }
.timeline-entry::before {
  content:'';position:absolute;left:-20px;top:6px;
  width:8px;height:8px;border-radius:50%;background:var(--text-primary);
  box-shadow:0 0 6px rgba(212,168,75,0.5);
}
.timeline-time { font-size:10px;color:var(--text-muted);margin-bottom:2px; }
.timeline-text { font-size:12px;color:var(--text-body); }

/* Time Display */
.time-display {
  display:flex;align-items:center;gap:6px;font-family:var(--font-serif);
  font-size:11px;color:var(--text-secondary);
}
.time-display .time-era { color:var(--text-primary); }

/* Market Table */
.market-table { width:100%;font-size:12px;border-collapse:collapse; }
.market-table th {
  text-align:left;padding:8px;color:var(--text-secondary);
  border-bottom:1px solid var(--border-subtle);font-weight:500;
}
.market-table td { padding:8px;color:var(--text-body);border-bottom:1px solid var(--border-subtle); }
.market-table tr:hover td { background:rgba(212,168,75,0.03); }

/* Action buttons */
.summary-action-btn {
  padding:6px 16px;background:var(--bg-card);border:1px solid var(--border-gold);
  color:var(--text-primary);font-family:var(--font-serif);font-size:12px;
  border-radius:4px;cursor:pointer;transition:all var(--transition-fast);
}
.summary-action-btn:hover { background:rgba(212,168,75,0.1); }

/* === Tavern / SillyTavern Integration === */
.tavern-container { display:flex;flex-direction:column;height:100%; }
.tavern-header {
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 16px;background:var(--bg-panel);border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;gap:8px;
}
.tavern-header .char-name { font-family:var(--font-serif);color:var(--text-primary);font-size:14px; }
.tavern-header .session-info { font-size:10px;color:var(--text-muted); }
.tavern-body { flex:1;display:flex;overflow:hidden; }
.tavern-main { flex:1;display:flex;flex-direction:column;overflow:hidden; }
.tavern-messages { flex:1;overflow-y:auto;padding:12px 16px; }
.tavern-input-bar {
  display:flex;gap:8px;padding:8px 16px;background:var(--bg-panel);
  border-top:1px solid var(--border-subtle);flex-shrink:0;
}
.tavern-input {
  flex:1;padding:8px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);
  color:var(--text-body);font-size:13px;border-radius:6px;resize:none;min-height:38px;
  font-family:inherit;
}
.tavern-input:focus { border-color:var(--border-gold-bright);outline:none; }
.tavern-send-btn {
  padding:8px 20px;background:rgba(212,168,75,0.1);border:1px solid var(--border-gold);
  color:var(--text-primary);font-family:var(--font-serif);font-size:13px;
  border-radius:6px;cursor:pointer;transition:all var(--transition-fast);flex-shrink:0;
}
.tavern-send-btn:hover { background:rgba(212,168,75,0.2); }
.tavern-send-btn:disabled { opacity:0.4;cursor:not-allowed; }

/* Game mode message */
.msg-maintext {
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:8px;padding:14px 18px;margin-bottom:12px;
  color:var(--text-body);font-size:13px;line-height:1.8;white-space:pre-wrap;
}
.msg-maintext.typing::after { content:'▍';animation:blink 0.6s infinite;color:var(--text-primary); }
.msg-summary {
  background:rgba(150,130,100,0.05);border:1px solid var(--border-subtle);
  border-radius:6px;padding:8px 14px;margin-bottom:8px;
  font-size:11px;color:var(--text-muted);font-style:italic;
}
.msg-options {
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;
}
.msg-option-btn {
  padding:8px 18px;background:var(--bg-card);border:1px solid var(--border-gold);
  color:var(--text-primary);font-family:var(--font-serif);font-size:12px;
  border-radius:20px;cursor:pointer;transition:all var(--transition-fast);
}
.msg-option-btn:hover { background:rgba(212,168,75,0.15);border-color:var(--text-primary);transform:translateY(-1px); }
.msg-vars {
  background:rgba(180,120,200,0.05);border:1px solid rgba(180,120,200,0.2);
  border-radius:4px;padding:6px 12px;margin-bottom:8px;font-size:10px;color:var(--text-muted);
}
.msg-thinking-fold {
  margin-bottom:8px;
}
.msg-thinking-fold summary {
  font-size:10px;color:var(--text-dim);cursor:pointer;padding:4px 0;
}
.msg-thinking-fold .think-content {
  font-size:10px;color:var(--text-muted);padding:6px 12px;
  background:rgba(100,100,100,0.03);border-left:1px solid var(--border-subtle);
  margin-top:4px;white-space:pre-wrap;
}

/* Chat session sidebar */
.tavern-sidebar {
  width:200px;border-left:1px solid var(--border-subtle);background:var(--bg-panel);
  display:flex;flex-direction:column;flex-shrink:0;
}
.tavern-sidebar-header {
  padding:10px 12px;border-bottom:1px solid var(--border-subtle);
  display:flex;justify-content:space-between;align-items:center;
}
.tavern-sidebar-header span { font-family:var(--font-serif);color:var(--text-secondary);font-size:12px; }
.tavern-sidebar-list { flex:1;overflow-y:auto;padding:6px; }
.tavern-session-item {
  padding:8px 10px;border-radius:4px;cursor:pointer;margin-bottom:3px;
  transition:all var(--transition-fast);border:1px solid transparent;
}
.tavern-session-item:hover { background:var(--bg-hover); }
.tavern-session-item.active { border-color:var(--border-gold);background:rgba(212,168,75,0.05); }
.tavern-session-item .sess-name { color:var(--text-body);font-size:12px; }
.tavern-session-item .sess-meta { font-size:9px;color:var(--text-dim); }

.tavern-toolbar {
  display:flex;gap:4px;padding:6px 8px;border-top:1px solid var(--border-subtle);
}
.tavern-tool-btn {
  flex:1;padding:4px;background:transparent;border:1px solid var(--border-subtle);
  color:var(--text-dim);font-size:10px;border-radius:4px;cursor:pointer;
  transition:all var(--transition-fast);
}
.tavern-tool-btn:hover { color:var(--text-secondary);border-color:var(--border-gold); }

/* World Info / Lorebook list */
.lorebook-item {
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:6px;margin-bottom:6px;
}
.lorebook-item .lb-name { color:var(--text-body);font-size:12px; }
.lorebook-item .lb-count { font-size:10px;color:var(--text-muted); }
.lorebook-toggle { width:18px;height:18px;cursor:pointer;accent-color:var(--text-primary); }
.entry-row {
  display:flex;gap:6px;align-items:center;padding:6px 8px;margin-bottom:4px;
  background:var(--bg-card);border-radius:4px;font-size:11px;
}
.entry-row .entry-key { color:var(--accent-blue);min-width:60px; }
.entry-row .entry-content { color:var(--text-body);flex:1; }
.entry-row .entry-keys { font-size:9px;color:var(--text-muted); }

/* Preset card */
.preset-card {
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all var(--transition-fast);
}
.preset-card:hover { border-color:var(--border-gold); }
.preset-card.active { border-color:var(--text-primary);background:rgba(212,168,75,0.05); }
.preset-card .preset-name { color:var(--text-primary);font-family:var(--font-serif);font-size:13px; }
.preset-card .preset-model { font-size:10px;color:var(--text-muted); }

/* Character card import */
.char-card-preview {
  display:flex;gap:12px;padding:14px;background:var(--bg-card);border:1px solid var(--border-gold);
  border-radius:8px;margin-bottom:12px;align-items:center;
}
.char-card-preview .char-avatar-lg {
  width:60px;height:60px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  background:linear-gradient(135deg,var(--bg-hover),var(--bg-card));
  border:2px solid var(--border-gold);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-serif);font-size:22px;color:var(--text-primary);flex-shrink:0;
}
.char-card-preview .char-meta { flex:1; }
.char-card-preview .char-card-name { color:var(--text-primary);font-family:var(--font-serif);font-size:16px; }
.char-card-preview .char-card-desc { font-size:11px;color:var(--text-body);margin-top:4px; }

/* File import zone */
.import-zone {
  border:1px dashed var(--border-gold);border-radius:8px;padding:24px;
  text-align:center;cursor:pointer;transition:all var(--transition-fast);
  margin-bottom:12px;
}
.import-zone:hover { background:rgba(212,168,75,0.03);border-color:var(--text-primary); }
.import-zone input { display:none; }
</style>

var QuestSystem = {
  quests: [],
  completed: [],
  failed: []
};
function addQuest(name, desc, reward, penalty, difficulty) {
  difficulty = difficulty || '普通';
  var q = { id:'q'+Date.now(), name:name, desc:desc, reward:reward, penalty:penalty || '无惩罚', difficulty:difficulty, createdAt:new Date().toLocaleString() };
  QuestSystem.quests.push(q);
  return q;
}
function completeQuest(qid) {
  var idx = QuestSystem.quests.findIndex(function(q){return q.id===qid;});
  if (idx<0) return;
  var q = QuestSystem.quests.splice(idx,1)[0];
  q.completedAt = new Date().toLocaleString();
  QuestSystem.completed.push(q);
  showToast('任务完成：'+q.name+' · 奖励：'+q.reward,'success');
}
function failQuest(qid) {
  var idx = QuestSystem.quests.findIndex(function(q){return q.id===qid;});
  if (idx<0) return;
  var q = QuestSystem.quests.splice(idx,1)[0];
  q.failedAt = new Date().toLocaleString();
  QuestSystem.failed.push(q);
  var hasPenalty = q.penalty && q.penalty !== '无惩罚' && Math.random() > 0.1;
  showToast('任务失败：'+q.name+(hasPenalty ? ' · '+q.penalty : ' · 侥幸无惩罚'), hasPenalty ? 'error' : 'info');
}

// TIME REWIND (时空回溯)
// ==============================
var TimeRewind = {
  snapshots: [],
  maxSnapshots: 20
};
function takeSnapshot(chatMessages, variables) {
  TimeRewind.snapshots.push({
    id: Date.now(),
    time: new Date().toLocaleString(),
    messages: JSON.parse(JSON.stringify(chatMessages || [])),
    variables: JSON.parse(JSON.stringify(variables || {})),
    player: JSON.parse(JSON.stringify(GameState.player || {}))
  });
  if (TimeRewind.snapshots.length > TimeRewind.maxSnapshots) TimeRewind.snapshots.shift();
}
function rewindToSnapshot(sid) {
  var snap = TimeRewind.snapshots.find(function(s){return s.id===sid;});
  if (!snap) return;
  // Restore player state
  if (snap.player) GameState.player = snap.player;
  // Restore chat variables
  var activeChat = tavernState.chats.find(function(c){return c.id===tavernState.activeChatId;});
  if (activeChat) {
    activeChat.messages = snap.messages;
    activeChat.variables = snap.variables;
    activeChat.updatedAt = Date.now();
    db.chats.put(activeChat);
    renderTavernMessages();
  }
  // Remove all snapshots after this one
  var idx = TimeRewind.snapshots.indexOf(snap);
  if (idx >= 0) TimeRewind.snapshots = TimeRewind.snapshots.slice(0, idx + 1);
  saveToLocalStorage();
  showToast('时空回溯完成，已回到：'+snap.time,'success');
}

function padNum(n, len) {
  var s = String(n);
  while (s.length < len) s = '0' + s;
  return s;

  return getTimeFormatExample();
}

function advanceTime(hours) {
  if (!hours || hours <= 0) return;
  GameTime.totalHours += hours;
  GameTime.hour += hours;
  while (GameTime.hour >= 12) {
    GameTime.hour -= 12;
    GameTime.day++;
    if (GameTime.day > 30) {
      GameTime.day = 1;
      GameTime.month++;
      if (GameTime.month > 12) {
        GameTime.month = 1;
        GameTime.year++;
      }
    }
  }
}

var Economy = {
  gold: 0,       // 金币
  silver: 0,     // 银币
  copper: 0,     // 铜币
  spiritStones: 0 // 灵石
};

// 1 金币 = 100 银币 = 10000 铜币, 1 灵石 ≈ 100 金币
function normalizeCurrency() {
  // Normalize copper → silver → gold
  while (Economy.copper >= 100) {
    Economy.copper -= 100;
    Economy.silver += 1;
  }
  while (Economy.silver >= 100) {
    Economy.silver -= 100;
    Economy.gold += 1;
  }
  while (Economy.copper < 0 && Economy.silver > 0) {
    Economy.silver -= 1;
    Economy.copper += 100;
  }
  while (Economy.silver < 0 && Economy.gold > 0) {
    Economy.gold -= 1;
    Economy.silver += 100;
  }
  // Floor at 0
  if (Economy.copper < 0) Economy.copper = 0;
  if (Economy.silver < 0) Economy.silver = 0;
  if (Economy.gold < 0) Economy.gold = 0;
  if (Economy.spiritStones < 0) Economy.spiritStones = 0;
}

function addGold(g) { Economy.gold += (g || 0); normalizeCurrency(); }
function addSilver(s) { Economy.silver += (s || 0); normalizeCurrency(); }
function addCopper(c) { Economy.copper += (c || 0); normalizeCurrency(); }
function addSpiritStones(ss) { Economy.spiritStones += (ss || 0); if (Economy.spiritStones < 0) Economy.spiritStones = 0; }

function getTotalGoldValue() {
  return Economy.gold + Economy.silver / 100 + Economy.copper / 10000;
}

function updatePointsDisplay() {
  var el = document.getElementById('creation-points-value');
  if (!el) return;
  if (!GameState.player.difficulty) {
    // No difficulty selected yet — show 0
    el.textContent = '0';
    el.style.color = 'var(--text-dim)';
    return;
  }
  var remaining = GameState.player.points - GameState.player.pointsSpent;
  el.textContent = remaining;
  el.style.color = remaining > 20 ? 'var(--accent-green)' : remaining > 5 ? '#ffaa00' : '#ff4444';
}

function recalculatePoints() {
  var spent = 0;
  // Race cost
  var race = RACES.find(function(r) { return r.id === GameState.player.race; });
  if (race) spent += race.cost;
  // Identity cost
  var identity = IDENTITIES.find(function(i) { return i.id === GameState.player.identity; });
  if (identity) spent += identity.cost;
  // Base stats: each point costs 1
  var bs = GameState.player.baseStats;
  for (var k in bs) { if (bs.hasOwnProperty(k)) spent += bs[k]; }
  // Talent costs (skip free talents from puzzle reward)
  var freeTalents = GameState.player.freeTalents || [];
  GameState.player.talents.forEach(function(tid) {
    if (freeTalents.indexOf(tid) >= 0) return; // free talent, skip cost
    for (var t = 0; t < TALENT_TIERS.length; t++) {
      var tier = TALENT_TIERS[t];
      if (TALENTS[tier.key].some(function(tl) { return tl.id === tid; })) {
        spent += tier.cost;
        break;
      }
    }
  });
  // Douqi attribute costs: first free, second 10 points
  if (GameState.player.douqiAttributes.length >= 2) spent += 10;
  GameState.player.pointsSpent = spent;
  updatePointsDisplay();
}

// ==============================
// PERFORMANCE STATS
// ==============================

function updatePerformanceStats() {
  var race = RACES.find(function(r) { return r.id === GameState.player.race; });
  if (!race) return;
  var bs = GameState.player.baseStats;
  var c = race.coeff;
  var perf = {
    hp: Math.round(bs.endurance * 20 * c.hp),
    dp: Math.round(bs.douqi * 20 * c.dp),
    pa: Math.round(bs.strength * 8 * c.pa),
    da: Math.round(bs.douqi * 8 * c.da),
    pd: Math.round((bs.endurance + bs.strength) * 4 * c.pd),
    dd: Math.round((bs.douqi + bs.soul) * 4 * c.dd),
    ph: Math.round(bs.agility * 5 * c.ph),
    dh: Math.round(bs.soul * 5 * c.dh),
    cr: Math.round(bs.agility * c.cr * 10) / 10
  };
  GameState.player.performanceStats = perf;
  for (var k in perf) {
    if (!perf.hasOwnProperty(k)) continue;
    var el = document.getElementById('perf-stat-' + k);
    if (el) el.textContent = k === 'cr' ? perf[k] + '%' : perf[k];
  }
}

  switch(creationCurrentStep) {

    case 3: renderCreationStep3(); break;
    case 4: renderCreationStep4(); break;
    case 5: renderCreationStep5(); break;
  }

function creationPrev() {
  creationCurrentStep = Math.max(0, creationCurrentStep - 1);
  var prevBtn = document.getElementById('creation-prev');

    case 2: renderCreationStep2(); break;
    case 3: renderCreationStep3(); break;
    case 4: renderCreationStep4(); break;
    case 5: renderCreationStep5(); break;
  }
}

function updateStepIndicator() {
  document.querySelectorAll('#creation-steps .step-indicator').forEach(function(el, i) {

  });

// LOTTERY WHEEL
// ==============================

var wheelRotation = 0; // Current CSS rotation in radians (accumulated)
var isSpinning = false;

function drawWheel(highlightIndex) {
  // highlightIndex: index of segment to glow, or -1 / undefined for none
  if (typeof highlightIndex === 'undefined') highlightIndex = -1;
  var canvas = document.getElementById('lottery-wheel');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var cx = 160, cy = 160, r = 150;
  var segments = DOUQI_ATTRS.length;
  var arcSize = (2 * Math.PI) / segments;

  ctx.clearRect(0, 0, 320, 320);

  // Draw outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r + 8, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(212,168,75,0.4)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Draw segments
  for (var i = 0; i < segments; i++) {
    var startAngle = i * arcSize;
    var endAngle = startAngle + arcSize;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();

    // Highlight winning segment with glow
    if (i === highlightIndex) {
      ctx.fillStyle = 'rgba(212,168,75,0.25)';
      ctx.shadowColor = 'rgba(212,168,75,0.9)';
      ctx.shadowBlur = 24;
    } else {
      ctx.fillStyle = i % 2 === 0 ? '#0d0d18' : '#111122';
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
    ctx.fill();
    // Reset shadow for stroke
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Segment border — brighter for highlighted
    ctx.strokeStyle = i === highlightIndex ? 'rgba(212,168,75,0.9)' : 'rgba(212,168,75,0.15)';
    ctx.lineWidth = i === highlightIndex ? 2.5 : 1;
    ctx.stroke();

    // Attribute name
    var midAngle = startAngle + arcSize / 2;
    var textR = r * 0.65;
    var tx = cx + Math.cos(midAngle) * textR;
    var ty = cy + Math.sin(midAngle) * textR;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.fillStyle = i === highlightIndex ? '#ffffff' : DOUQI_ATTRS[i].color;
    ctx.font = 'bold 13px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    // Glow text shadow for highlighted segment
    if (i === highlightIndex) {
      ctx.shadowColor = 'rgba(255,255,255,0.8)';
      ctx.shadowBlur = 8;
    }
    ctx.fillText(DOUQI_ATTRS[i].name, 0, 0);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 36, 0, 2 * Math.PI);
  ctx.fillStyle = '#0a0a12';
  ctx.fill();
  ctx.strokeStyle = 'rgba(212,168,75,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spinWheel() {
  if (isSpinning) return;

  // First spin is free, second costs 10 points
  var attrCount = GameState.player.douqiAttributes.length;
  var cost = attrCount === 0 ? 0 : 10;
  var remaining = GameState.player.points - GameState.player.pointsSpent;
  if (remaining < cost) {
    showToast('点数不足！需要 ' + cost + ' 点', 'error');
    return;
  }

  isSpinning = true;
  var btn = document.getElementById('wheel-spin-btn');
  if (btn) btn.disabled = true;

  // Deduct points
  GameState.player.pointsSpent += cost;
  updatePointsDisplay();
  saveToLocalStorage();

  // Clear previous highlight before spinning
  drawWheel(-1);

  var arcSize = (2 * Math.PI) / DOUQI_ATTRS.length;
  var randomSegment = Math.floor(Math.random() * DOUQI_ATTRS.length);
  var extraSpins = Math.floor(Math.random() * 5) + 6; // 6-10 full rotations

  // Pointer is at top of wheel (12 o'clock = -π/2 from canvas 3 o'clock)
  // Segment i is drawn at canvas angle [i*arcSize, (i+1)*arcSize], center at (i+0.5)*arcSize
  // After CSS rotation by θ, canvas angle α appears on screen at α + θ
  // For segment to be under pointer: (randomSegment + 0.5)*arcSize + θ ≡ -π/2 (mod 2π)
  // θ ≡ -π/2 - (randomSegment + 0.5)*arcSize (mod 2π)
  var baseAngle = -Math.PI / 2 - (randomSegment + 0.5) * arcSize;
  // Normalize to [0, 2π)
  baseAngle = ((baseAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  var targetRotation = extraSpins * 2 * Math.PI + baseAngle;

  var canvas = document.getElementById('lottery-wheel');
  if (canvas) {
    canvas.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
    wheelRotation = targetRotation;
    canvas.style.transform = 'rotate(' + (wheelRotation * 180 / Math.PI) + 'deg)';
  }

  // Determine result after spin animation
  setTimeout(function() {
    isSpinning = false;

    // Redraw with winning segment glowing under pointer
    drawWheel(randomSegment);

    // Get the landed attribute — exactly ONE attribute per spin
    var landedAttr = DOUQI_ATTRS[randomSegment];

    // Already owned?
    if (GameState.player.douqiAttributes.indexOf(landedAttr.id) >= 0) {
      showToast('该属性已拥有，请继续尝试', 'info');
    } else if (GameState.player.douqiAttributes.length >= 2) {
      // Already have 2, need to replace one
      showReplaceModal(landedAttr);
    } else {
      // Add directly
      GameState.player.douqiAttributes.push(landedAttr.id);
      showToast('获得斗气属性：' + landedAttr.name, 'success');
      updateLotteryRecord();
      recalculatePoints();
      saveToLocalStorage();
    }

    // Update button state
    if (btn) {
      btn.textContent = GameState.player.douqiAttributes.length >= 2 ? '继续抽取 (替换)' : '抽 奖';
      btn.disabled = false;
    }
  }, 4200);
}

    '<span style="font-size:11px;color:var(--text-muted);">已获得属性：</span>' +

var puzzleAnswer = 0;
var puzzleSolved = false;
var puzzleRewardEarned = false;
var puzzleSkipChecked = false;
var puzzleSequence = [];

function generatePuzzle() {
  var puzzles = [
    function() {
      var start = randInt(1, 20), diff = randInt(2, 9);
      var seq = [];
      for (var i = 0; i < 5; i++) seq.push(start + diff * i);
      return { sequence: seq, answer: start + diff * 5, rule: '等差数列' };
    },
    function() {
      var start = randInt(1, 4), ratio = randInt(2, 4);
      var seq = []; var v = start;
      for (var i = 0; i < 5; i++) { seq.push(v); v *= ratio; }
      return { sequence: seq, answer: v, rule: '等比数列' };
    },
    function() {
      var a = randInt(1, 5), b = randInt(2, 8);
      var seq = [a, b];
      for (var i = 2; i < 6; i++) seq.push(seq[i-1] + seq[i-2]);
      return { sequence: seq.slice(0, 5), answer: seq[5], rule: '斐波那契式' };
    },
    function() {
      var start = randInt(1, 6);
      var seq = [];
      for (var i = 0; i < 5; i++) seq.push((start + i) * (start + i));
      return { sequence: seq, answer: (start + 5) * (start + 5), rule: '平方数' };
    },
    function() {
      var start = randInt(2, 6); var seq = [start]; var v = start;
      for (var i = 1; i < 5; i++) { v = (i % 2 === 1) ? v * 2 : v - 1; seq.push(v); }
      return { sequence: seq, answer: (seq.length % 2 === 1) ? v * 2 : v - 1, rule: '交替乘2减1' };
    },
    function() {
      var start = randInt(1, 4); var seq = [];
      for (var i = 0; i < 5; i++) { var n = start + i; seq.push(n * (n + 1) / 2); }
      var n = start + 5;
      return { sequence: seq, answer: n * (n + 1) / 2, rule: '三角形数' };
    },
    function() {
      var start = randInt(0, 3); var seq = [];
      for (var i = 0; i < 5; i++) seq.push(Math.pow(2, start + i));
      return { sequence: seq, answer: Math.pow(2, start + 5), rule: '2的幂次方' };
    },
    function() {
      var diff = randInt(3, 8); var seq = [randInt(1, 5)];
      for (var i = 1; i < 5; i++) seq.push(seq[i-1] + diff * i);
      return { sequence: seq, answer: seq[4] + diff * 5, rule: '增量递增' };
    }
  ];
  return puzzles[Math.floor(Math.random() * puzzles.length)]();
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function renderCreationStep5() {

  container.innerHTML =

          '<p style="color:var(--text-secondary);font-size:11px;margin-bottom:12px;letter-spacing:2px;">请找出下列数字的规律，填入下一个数字</p>' +

            '<button class="summary-action-btn" onclick="checkPuzzle()">验证</button>' +

      (puzzleRewardEarned && puzzleSolved ? '<p style="color:var(--accent-green);font-size:13px;">奖励已领取，请继续下一步</p><p style="color:var(--text-dim);font-size:10px;">（你不是小猪，你很聪明）</p>' : '') +
    '</div>';
}

var puzzleAttempts = 0;

function checkPuzzle() {
  var input = document.getElementById('puzzle-input');
  var feedback = document.getElementById('puzzle-feedback');
  if (!input || !feedback) return;
  var val = parseInt(input.value);
  if (isNaN(val)) {
    feedback.innerHTML = '<span style="color:#ff6644;">请输入一个数字</span>';
    return;
  }
  if (val === puzzleAnswer) {
    puzzleSolved = true;
    puzzleAttempts = 0;
    renderCreationStep5();
  } else {
    puzzleAttempts++;
    if (puzzleAttempts >= 3) {
      puzzleAttempts = 0;
      var puzzle = generatePuzzle();
      puzzleAnswer = puzzle.answer;
      puzzleSequence = puzzle.sequence;
      feedback.innerHTML = '<span style="color:#ffaa00;">换了一题，再试试吧！新规律等你发现~</span>';
      renderCreationStep5();
    } else {
      feedback.innerHTML = '<span style="color:#ff6644;">不对哦，还剩 ' + (3 - puzzleAttempts) + ' 次机会~</span>';
      input.value = '';
      input.focus();
    }
  }
}

function getIdentityStartingSkills(identityId) {

  switch(identityId) {

      break;
    case 'swordsmith': case 'wanderingSwordsman':
      base.push({ name:'基础剑法', grade:'黄', type:'技', mastery:20, desc:'入门剑术，凌厉迅捷' });
      break;
    case 'formationMaster':
      base.push({ name:'阵法初解', grade:'黄', type:'技', mastery:15, desc:'基础阵法布置之法' });
      break;
    case 'poisonMaster':
      base.push({ name:'毒经', grade:'玄', type:'技', mastery:10, desc:'出云帝国毒功基础，阴毒诡异' });
      break;
    default:
      base.push({ name:'基础斗气修炼法', grade:'黄', type:'功', mastery:10, desc:'大陆通用的入门功法' });
  }
  // Everyone gets the basic cultivation method too
  if (base.length === 0 || (base[0].name !== '基础斗气修炼法')) {
    base.push({ name:'基础斗气修炼法', grade:'黄', type:'功', mastery:10, desc:'大陆通用的入门功法' });
  }
  return base;
}

function continueGame() {
  if (!GameState.player.name || !GameState.player.race) {
    showToast('暂无有效存档，请开启新人生', 'warning');
    return;
  }
  showView('view-game');
  GameState.phase = 'game';
  initGameWorld();
  showToast('继续人生...欢迎回来，' + GameState.player.name, 'info');
}

function openTimeRewind() {
  var snaps = TimeRewind.snapshots || [];
  if (snaps.length === 0) { showToast('暂无回溯记录，请先进行对话', 'info'); return; }
  var html = '<h3 style="margin-bottom:12px;">⏪ 时空回溯</h3>';
  html += '<p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">选择要回到的回合，变量和聊天内容将一并回溯</p>';
  snaps.slice().reverse().forEach(function(s, i) {
    html += '<div class="settings-card" style="padding:10px 14px;margin-bottom:6px;cursor:pointer;" onclick="if(confirm(\'确定回溯到 '+s.time+' 吗？此操作不可撤销。\')){closeAllModals();rewindToSnapshot('+s.id+');}">' +
      '<span style="color:var(--text-primary);">📸 回合 #' + (snaps.length - i) + '</span>' +
      '<span style="font-size:10px;color:var(--text-muted);margin-left:10px;">' + s.time + '</span>' +
      '<span style="font-size:10px;color:var(--text-muted);margin-left:8px;">' + (s.messages?s.messages.length:0) + ' 条消息</span>' +
    '</div>';
  });
  html += '<button class="text-btn" style="margin-top:8px;width:100%;" onclick="closeAllModals()">取消</button>';
  showModal(html);
}

function buildQuestsView() {
  var container = document.getElementById('game-view-quests');
  if (!container) return;
  var active = QuestSystem.quests || [];
  var done = QuestSystem.completed || [];
  var failed = QuestSystem.failed || [];
  var html = '<div style="padding:12px 20px;background:var(--bg-panel);border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;">' +
    '<span style="font-family:var(--font-serif);color:var(--text-primary);font-size:15px;">📋 任务 · ' + active.length + ' 进行中</span>' +
    '<button class="text-btn" onclick="addQuest(\'修炼精进\',\'提升修为至当前境界巅峰\',\'经验+200\',\'无\',\'普通\');buildQuestsView();">+ 添加测试任务</button>' +
  '</div>';
  html += '<div style="flex:1;overflow-y:auto;padding:16px 20px;">';
  if (active.length > 0) {
    html += '<div style="color:var(--text-secondary);font-family:var(--font-serif);font-size:12px;margin-bottom:8px;">进行中</div>';
    active.forEach(function(q) {
      html += '<div class="settings-card" style="padding:12px 16px;margin-bottom:8px;border-left:3px solid #ffaa00;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<div><span style="color:var(--text-primary);font-weight:600;">' + q.name + '</span><span style="font-size:10px;color:var(--text-muted);margin-left:8px;">' + q.difficulty + '</span></div>' +
          '<div style="display:flex;gap:4px;">' +
            '<button class="text-btn" style="color:var(--accent-green);" onclick="completeQuest(\'' + q.id + '\');buildQuestsView();">✓ 完成</button>' +
            '<button class="text-btn danger" onclick="failQuest(\'' + q.id + '\');buildQuestsView();">✕ 失败</button>' +
          '</div>' +
        '</div>' +
        '<div style="font-size:10px;color:var(--text-muted);">' + q.desc + '</div>' +
        '<div style="font-size:10px;margin-top:4px;"><span style="color:var(--accent-green);">奖励：' + q.reward + '</span> · <span style="color:var(--accent-fire);">惩罚：' + (q.penalty||'无') + '</span></div>' +
      '</div>';
    });
  }
  if (done.length > 0) {
    html += '<div style="color:var(--accent-green);font-family:var(--font-serif);font-size:12px;margin:14px 0 8px;">已完成 (' + done.length + ')</div>';
    done.slice(-5).reverse().forEach(function(q) {
      html += '<div class="settings-card" style="padding:8px 14px;margin-bottom:4px;opacity:0.6;border-left:3px solid var(--accent-green);">' +
        '<span style="font-size:11px;color:var(--text-body);">✓ ' + q.name + '</span><span style="font-size:9px;color:var(--text-muted);margin-left:8px;">' + q.completedAt + '</span>' +
      '</div>';
    });
  }
  if (failed.length > 0) {
    html += '<div style="color:var(--accent-fire);font-family:var(--font-serif);font-size:12px;margin:14px 0 8px;">已失败 (' + failed.length + ')</div>';
    failed.slice(-5).reverse().forEach(function(q) {
      html += '<div class="settings-card" style="padding:8px 14px;margin-bottom:4px;opacity:0.5;border-left:3px solid var(--accent-fire);">' +
        '<span style="font-size:11px;color:var(--text-body);">✕ ' + q.name + '</span><span style="font-size:9px;color:var(--text-muted);margin-left:8px;">' + q.failedAt + '</span>' +
      '</div>';
    });
  }
  if (active.length === 0 && done.length === 0 && failed.length === 0) {
    html += '<div style="text-align:center;padding:40px;color:var(--text-dim);">暂无任务</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

  var r = ROOM_DATA[key];

  var actions = '';
  if (key === 'meditation') {

    '<div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-muted);">使用者</span><span>' + r.user + '</span></div>' +

function startCultivation() {
  StudioState.cultivating = true;
  StudioState.cultivatingStart = Date.now();
  StudioState.cultivatingDuration = 30000; // 30 seconds
  StudioState.logs.push({ time: new Date().toLocaleTimeString(), text: '开始闭关修炼' });
  if (StudioState.logs.length > 50) StudioState.logs.shift();
  buildStudio();
  // Simulated completion
  setTimeout(function() {
    if (StudioState.cultivating) {
      StudioState.cultivating = false;
      StudioState.logs.push({ time: new Date().toLocaleTimeString(), text: '闭关结束，修为精进' });
      // Grant some XP
      if (GameState.player && GameState.player.cultivationProgress !== undefined) {
        GameState.player.cultivationProgress = (GameState.player.cultivationProgress || 0) + 5;
      }
      buildStudio();
      showToast('闭关完成！修为精进', 'success');
    }
  }, 30000);
  showToast('闭关修炼开始…预计30秒', 'info');
}

function getCultivationProgress() {
  if (!StudioState.cultivating) return '';
  var elapsed = Date.now() - StudioState.cultivatingStart;
  var total = StudioState.cultivatingDuration;
  var pct = Math.min(100, Math.round(elapsed / total * 100));
  var remaining = Math.max(0, Math.round((total - elapsed) / 1000));
  return pct + '% · 剩余' + remaining + '秒';
}

function startAlchemy() {
  var recipes = ['聚气散', '筑基灵液', '回气丹', '复伤丹'];
  var picked = recipes[Math.floor(Math.random() * recipes.length)];
  var success = Math.random() > 0.4;
  StudioState.logs.push({ time: new Date().toLocaleTimeString(), text: '炼制' + picked + (success ? '· 成功！' : '· 失败') });
  if (StudioState.logs.length > 50) StudioState.logs.shift();
  showToast((success ? '✅ ' : '❌ ') + picked + '炼制' + (success ? '成功' : '失败'), success ? 'success' : 'error');
}

function startMartialTraining() {
  var skills = ['八极崩', '焰分噬浪尺', '吸掌', '吹火掌'];
  var picked = skills[Math.floor(Math.random() * skills.length)];
  StudioState.logs.push({ time: new Date().toLocaleTimeString(), text: '研习' + picked + '· 熟练度提升' });
  if (StudioState.logs.length > 50) StudioState.logs.shift();
  showToast('⚔️ ' + picked + ' 研习完成', 'success');
}

function upgradeRoom(key) {
  var r = ROOM_DATA[key];
  if (!r) return;
  var cost = r.upgradeCost || {spirit:200,wood:100};
  if (r.level >= (r.maxLevel || 5)) {
    showToast('已达最高等级', 'warning');
    return;
  }
  r.level++;
  r.device = r.device.replace(/一阶|二阶|三阶|四阶|五阶|凡品|精品|极品|绝品|圣品/, function(m) {
    var map = {'一阶':'二阶','二阶':'三阶','三阶':'四阶','四阶':'五阶','凡品':'精品','精品':'极品','极品':'绝品','绝品':'圣品'};
    return map[m] || m;
  });
  r.effect = r.effect.replace(/\d+/, function(n) { return parseInt(n) + 5; });
  StudioState.logs.push({ time: new Date().toLocaleTimeString(), text: r.name + '升级至 Lv.' + r.level });
  if (StudioState.logs.length > 50) StudioState.logs.shift();
  showToast(r.name + ' 升级完成！', 'success');
  buildStudio();
}

function showModal(content) {
  var container = document.getElementById('modals-container');
  var id = 'modal-' + Date.now();
  container.innerHTML +=
    '<div class="modal-overlay" id="' + id + '" onclick="if(event.target===this)closeModal(\'' + id + '\')">' +
      '<div class="modal-content">' +
        '<button class="modal-close" onclick="closeModal(\'' + id + '\')">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
        '</button>' +
        content +
      '</div>' +
    '</div>';
  requestAnimationFrame(function() {
    var el = document.getElementById(id);
    if (el) el.classList.add('show');
  });
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) {
    el.classList.remove('show');
    setTimeout(function() { if (el.parentNode) el.remove(); }, 250);
  }
}

function openSettings() {
  // Remove any existing settings panel
  var existing = document.querySelector('.settings-overlay');
  if (existing) existing.remove();

  var tabsHtml = '';
  ['core','lorebook','presets','tavern','regex','depth'].forEach(function(key) {
    var cls = key === settingsActiveTab ? ' active' : '';
    tabsHtml += '<button class="settings-tab-btn' + cls + '" onclick="switchSettingsTab(\'' + key + '\')" title="' + settingsTabLabels[key] + '">' +
      (settingsTabIcons[key] || '') +
      '<span class="stab-label">' + (settingsTabShortLabels[key] || key) + '</span>' +
    '</button>';
  });

  var html =
    '<div class="settings-overlay show" id="settings-overlay" onclick="closeSettings()"></div>' +
    '<div class="settings-panel show" id="settings-panel">' +
      '<div class="settings-tab-sidebar" id="settings-tab-sidebar">' + tabsHtml + '</div>' +
      '<div class="settings-content-area">' +
        '<div class="settings-content-header">' +
          '<h3 id="settings-header-title">' + settingsTabLabels[settingsActiveTab] + '</h3>' +
          '<button class="settings-close-btn" onclick="closeSettings()">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
          '</button>' +
        '</div>' +
        '<div class="settings-content-body" id="settings-body"></div>' +
      '</div>' +
    '</div>';

  document.body.insertAdjacentHTML('beforeend', html);
  renderSettingsTab(settingsActiveTab);
  // Animate in
  requestAnimationFrame(function() {
    var overlay = document.getElementById('settings-overlay');
    var panel = document.getElementById('settings-panel');
    if (overlay) overlay.classList.add('show');
    if (panel) panel.classList.add('show');
  });
}

function closeSettings() {
  var overlay = document.getElementById('settings-overlay');
  var panel = document.getElementById('settings-panel');
  if (overlay) overlay.classList.remove('show');
  if (panel) panel.classList.remove('show');
  setTimeout(function() {
    if (overlay) overlay.remove();
    if (panel) panel.remove();
  }, 350);
}

function switchSettingsTab(key) {
  settingsActiveTab = key;
  // Update vertical tab buttons
  var btns = document.querySelectorAll('#settings-tab-sidebar .settings-tab-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  var activeBtn = document.querySelector('#settings-tab-sidebar .settings-tab-btn[onclick*="' + key + '"]');
  if (activeBtn) activeBtn.classList.add('active');
  // Update header
  var header = document.getElementById('settings-header-title');
  if (header) header.textContent = settingsTabLabels[key] || key;
  renderSettingsTab(key);
}

function renderSettingsTab(key) {
  var body = document.getElementById('settings-body');
  if (!body) return;
  switch(key) {
    case 'core': renderSettingsCore(body); break;
    case 'lorebook': renderSettingsLorebook(body); break;
    case 'presets': renderSettingsPresets(body); break;
    case 'tavern': renderSettingsTavern(body); break;
    case 'regex': renderSettingsRegex(body); break;
    case 'depth': renderSettingsDepth(body); break;
  }
}

function getProtocolState(key) {
  if (!GameState.settings.protocols) GameState.settings.protocols = {};
  if (!GameState.settings.protocols[key]) {
    var def = PROTOCOL_DEFAULTS[key];
    GameState.settings.protocols[key] = {
      enabled: def.alwaysOn ? true : true,
      custom: false,
      content: def.content
    };
  }
  return GameState.settings.protocols[key];
}

function buildProtocolCards() {
  var html = '';
  Object.keys(PROTOCOL_DEFAULTS).forEach(function(key) {
    var def = PROTOCOL_DEFAULTS[key];
    var state = getProtocolState(key);
    var enabled = state.enabled;
    var custom = state.custom;
    html += '<div class="settings-card' + (!def.alwaysOn && !enabled ? '' : ' active-card') + '" style="margin-bottom:10px;">' +
      // Header row
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '<div>' +
          '<span style="color:var(--text-primary);font-family:var(--font-serif);font-size:15px;font-weight:600;">' + def.name + '</span>' +
          '<span style="font-size:12px;color:var(--text-muted);margin-left:10px;">' + def.desc + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:16px;align-items:center;flex-shrink:0;">' +
          // Enable toggle (hidden for always-on)
          (def.alwaysOn ? '<span style="font-size:12px;color:var(--accent-green);white-space:nowrap;">始终启用</span>' :
            '<div style="display:flex;align-items:center;gap:6px;cursor:pointer;" onclick="var cb=this.querySelector(\'input[type=checkbox]\');cb.checked=!cb.checked;toggleProtocolEnabled(\'' + key + '\',cb.checked)">' +
              '<span style="font-size:12px;color:' + (enabled ? 'var(--accent-green)' : 'var(--text-muted)') + ';">' + (enabled ? '已启用' : '已禁用') + '</span>' +
              '<label class="toggle-switch" onclick="event.stopPropagation()">' +
                '<input type="checkbox" ' + (enabled ? 'checked' : '') + ' onchange="toggleProtocolEnabled(\'' + key + '\',this.checked)">' +
                '<span class="toggle-slider"></span>' +
              '</label>' +
            '</div>') +
          // Custom toggle (always present)
          '<div style="display:flex;align-items:center;gap:6px;cursor:pointer;" onclick="var cb=this.querySelector(\'input[type=checkbox]\');cb.checked=!cb.checked;toggleProtocolCustom(\'' + key + '\',cb.checked)">' +
            '<span style="font-size:12px;color:' + (custom ? 'var(--accent-blue)' : 'var(--text-muted)') + ';">自定义</span>' +
            '<label class="toggle-switch" onclick="event.stopPropagation()">' +
              '<input type="checkbox" ' + (custom ? 'checked' : '') + ' onchange="toggleProtocolCustom(\'' + key + '\',this.checked)">' +
              '<span class="toggle-slider"></span>' +
            '</label>' +
          '</div>' +
        '</div>' +
      '</div>' +
      // Content area
      '<textarea id="protocol-content-' + key + '" class="settings-form-input settings-textarea" ' +
        'style="min-height:' + (def.alwaysOn ? '70' : '50') + 'px;font-size:13px;line-height:1.6;' + (custom ? '' : 'opacity:0.4;pointer-events:none;') + '"' +
        (custom ? '' : ' readonly') + ' oninput="saveProtocolContent(\'' + key + '\',this.value)">' + state.content + '</textarea>' +
      '<div style="display:flex;gap:8px;margin-top:8px;">' +
        '<button class="save-action-btn" onclick="resetProtocolContent(\'' + key + '\')" style="font-size:10px;">↺ 恢复默认</button>' +
        '<button class="save-action-btn primary" onclick="saveProtocolContentManual(\'' + key + '\')" style="font-size:10px;">✓ 保存自定义</button>' +
      '</div>' +
    '</div>';
  });
  return html;
}

function toggleProtocolEnabled(key, checked) {
  var state = getProtocolState(key);
  state.enabled = checked;
  saveToLocalStorage();
  renderSettingsTab('core');
}

function toggleProtocolCustom(key, checked) {
  var state = getProtocolState(key);
  state.custom = checked;
  if (!checked) {
    state.content = PROTOCOL_DEFAULTS[key].content;
  }
  saveToLocalStorage();
  renderSettingsTab('core');
}

function saveProtocolContent(key, value) {
  var state = getProtocolState(key);
  state.content = value;
  saveToLocalStorage();
}

function resetProtocolContent(key) {
  var state = getProtocolState(key);
  state.content = PROTOCOL_DEFAULTS[key].content;
  state.custom = true;
  saveToLocalStorage();
  renderSettingsTab('core');
  showToast('「' + PROTOCOL_DEFAULTS[key].name + '」已恢复默认内容', 'success');
}

function saveProtocolContentManual(key) {
  var ta = document.getElementById('protocol-content-' + key);
  if (!ta) return;
  var state = getProtocolState(key);
  state.content = ta.value;
  state.custom = true;
  saveToLocalStorage();
  showToast('「' + PROTOCOL_DEFAULTS[key].name + '」自定义已保存', 'success');
}

function resolveProtocolVariables(text) {
  return text
    .replace(/\$\{current_time\}/g, getCurrentTimeString())
    .replace(/\$\{current_location\}/g, WorldState.location + ' · ' + WorldState.specificSpot)
    .replace(/\$\{season\}/g, getSeason())
    .replace(/\$\{weather\}/g, WorldState.weather)
    .replace(/\$\{time_format_rule\}/g, getTimeFormatRule())
    .replace(/\$\{time_format_example\}/g, getTimeFormatExample());
}

function buildProtocolSystemPrompt() {
  var parts = [];
  Object.keys(PROTOCOL_DEFAULTS).forEach(function(key) {
    var state = getProtocolState(key);
    if (state.enabled && state.content) {
      parts.push(resolveProtocolVariables(state.content));
    }
  });
  return parts.join('\n\n');
}

function deletePresetPrompt(presetId, idx) {
  var preset = tavernState.presets.find(function(p) { return p.id === presetId; });
  if (!preset || !preset.prompts) return;
  preset.prompts.splice(idx, 1);
  openPresetPromptEditor(presetId);
}

function movePresetPrompt(presetId, idx, dir) {
  var preset = tavernState.presets.find(function(p) { return p.id === presetId; });
  if (!preset || !preset.prompts) return;
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= preset.prompts.length) return;
  var tmp = preset.prompts[idx];
  preset.prompts[idx] = preset.prompts[newIdx];
  preset.prompts[newIdx] = tmp;
  openPresetPromptEditor(presetId);
}

function togglePresetPrompt(presetId, idx, checked) {

  preset.prompts[idx].enabled = checked;
