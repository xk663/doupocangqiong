    // ========== 三十、原著经典场景 ==========
    createLorebookEntry({ keys:['退婚'], content:'十五岁的萧炎在萧家大厅当着全族的面被纳兰嫣然退婚。云岚宗以三枚聚气散为"赔偿"，对萧家极尽羞辱。萧炎当场撕毁婚书，咬破手指写下三年之约血书——三年后必上云岚宗，洗刷今日之辱。这是萧炎人生的转折点和修炼动力的源头。' }),
    createLorebookEntry({ keys:['第一次吞噬异火'], content:'萧炎在塔戈尔大沙漠地心岩浆中首次尝试吞噬异火。青莲地心火被美杜莎女王先行吞噬后能量大减，萧炎在药老护法和多种丹药辅助下艰难将其炼化。吞噬过程持续数日，经脉数次几近焚毁，药老灵魂力几乎耗尽才勉强成功。焚决由此从黄阶低级进化为玄阶中级。' }),
    createLorebookEntry({ keys:['炼药师大会'], content:'加玛帝国炼药师大会在帝都举办，由炼药师公会会长法犸主持。大会汇集帝国最优秀的年轻炼药师角逐排名。萧炎以化名"岩枭"参赛，一路以惊人控火术和成丹率碾压对手夺得冠军，名震帝都。' }),
    createLorebookEntry({ keys:['陨落心炎暴动'], content:'迦南学院内院焚天练气塔中的陨落心炎每隔数年爆发一次心火暴动，塔中学员需紧急撤离。萧炎在最近一次暴动中深入塔底收服陨落心炎，彻底解决了学院千年的心火隐患。但也因此与学院的利益冲突一度剑拔弩张。' }),
    createLorebookEntry({ keys:['萧家遭袭'], content:'云岚宗大长老云棱违背三年之约，率宗内强者夜袭乌坦城萧家。萧家族人死伤惨重，萧战被魂殿趁机掳走。萧炎归来时只见残垣断壁和族人尸首，怒发冲冠杀上云岚宗。这一夜彻底改变了萧炎与云岚宗的恩怨性质——从私人约定升级为灭门血仇。' }),
    createLorebookEntry({ keys:['药老复活'], content:'萧炎以生骨融血丹为根基，以多种天材地宝为辅，历时数年在星陨阁中为药老炼制新的肉身。新肉身融合了药老生前的本源精血和多种远古药材精华。药老复活后实力恢复至半圣境界，星陨阁重新有了明面掌舵人。' }),
    createLorebookEntry({ keys:['炎帝破空'], content:'双帝之战后，萧炎以炎帝之名在大陆停留三年。安頓亲人旧友，将萧家安置妥当，为薰儿、美杜莎、女儿萧潇留下斗帝血脉护佑。三年后以帝炎之力撕开位面壁障，独自破空前往大千世界。离别时彩鳞含泪、薰儿沉默、萧潇哭喊着追向天空。' })

  ];

  // ========== 智能分类：蓝/绿灯 + 插入位置 ==========
  // 蓝灯 = 始终注入（仅核心修炼体系，不随场景变化）
  // 绿灯 = 关键词触发（人物/地点/事件/物品/功法，提到才注入）
  // 位置 0 = 角色定义前，位置 1 = 角色定义后，位置 6+ = D4+深度
  book.entries.forEach(function(entry) {
    var allKeys = (entry.keys || []).join(',').toLowerCase();
    var content = (entry.content || '').toLowerCase();

    // === 蓝灯：仅核心修炼体系（任何场景都需要的底层规则）===
    // 注意：用 includes 精确匹配单个 key，避免子串误伤（如"炼药师公会"误匹配"炼药师"）
    var keysArr = entry.keys || [];
    var hasKey = function(w) { return keysArr.indexOf(w) >= 0; };
    var isBlue = (
      (hasKey('修炼') || hasKey('斗气')) && hasKey('境界') ||
      hasKey('功法') && hasKey('功法等级') ||
      hasKey('斗技') && hasKey('斗技等级') ||
      hasKey('炼药师') && hasKey('丹药') ||
      hasKey('灵魂力') ||
      hasKey('丹药种类') ||
      hasKey('异火榜') // 异火总纲
    );

    if (isBlue) {
      // 蓝灯：始终发送，位置在角色定义前（底层规则，不抢角色注意力）
      entry.constant = true;
      entry.position = 0;
      entry.selective = true;
      entry.noRecurse = true;
    } else {
      // === 绿灯：关键词触发 ===
      entry.constant = false;
      // 位置判断
      if (allKeys.indexOf('魔兽') >= 0 && allKeys.indexOf('阶位') >= 0) {
        entry.position = 0; // 魔兽阶位：定义前
      } else if (allKeys.indexOf('异火') >= 0 && allKeys.indexOf('榜') < 0) {
        entry.position = 0; // 单种异火：定义前
      } else if (allKeys.indexOf('远古八族') >= 0 && allKeys.indexOf('八族') >= 0) {
        entry.position = 1; // 远古八族总纲：定义后
      } else if (allKeys.indexOf('三年之约') >= 0 || allKeys.indexOf('双帝之战') >= 0 || allKeys.indexOf('云岚宗覆灭') >= 0 || allKeys.indexOf('古帝洞府开启') >= 0 || allKeys.indexOf('魂族灭族') >= 0) {
        entry.position = 6; // 重大事件：D4 深度
      } else if (allKeys.indexOf('斗帝') >= 0 && allKeys.indexOf('斗帝之路') >= 0) {
        entry.position = 6; // 斗帝秘辛：D4
      } else if (allKeys.indexOf('炎帝') >= 0 && allKeys.indexOf('破空') < 0) {
        entry.position = 6; // 炎帝称号：D4
      } else if (allKeys.indexOf('大千世界') >= 0) {
        entry.position = 6; // 大千世界：D4
      } else if (allKeys.indexOf('炎帝破空') >= 0) {
        entry.position = 6; // 炎帝破空：D4
      } else if (allKeys.indexOf('焚决') >= 0 && allKeys.indexOf('焚决功法') >= 0) {
        entry.position = 1; // 焚决总纲：定义后（重要功法）
      } else if (allKeys.indexOf('佛怒火莲') >= 0) {
        entry.position = 1; // 核心自创斗技：定义后
      } else {
        entry.position = 0; // 默认：角色定义前
      }
      entry.selective = true;   // 不可递归：不被其他条目误触发
      entry.noRecurse = true;   // 防止进一步递归：不连带触发其他条目
    }
  });

  return book;
}

            '<button class="text-btn" onclick="openTimeRewind()" title="时空回溯" style="font-size:10px;">⏪ 时空回溯 (' + (TimeRewind.snapshots?TimeRewind.snapshots.length:0) + ')</button>' +

function renderTavernSessionList() {
  var list = document.getElementById('tavern-session-list');
  if (!list) return;
  if (tavernState.chats.length === 0) {
    list.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-dim);font-size:11px;">暂无对话<br/>点击 + 新建开始</div>';
    return;
  }
  list.innerHTML = tavernState.chats.map(function(c) {
    var active = c.id === tavernState.activeChatId;
    var date = new Date(c.updatedAt);
    var dateStr = date.getMonth()+1 + '/' + date.getDate() + ' ' + date.getHours() + ':' + String(date.getMinutes()).padStart(2,'0');
    return '<div class="tavern-session-item' + (active ? ' active' : '') + '" onclick="switchTavernChat(\'' + c.id + '\')">' +
      '<div class="sess-name">' + (c.name || '未命名') + '</div>' +
      '<div class="sess-meta">' + c.messages.length + '条消息 · ' + dateStr + '</div>' +
    '</div>';
  }).join('');
}

function renderTavernMessages() {
  var msgs = document.getElementById('tavern-messages');
  if (!msgs) return;
  var chat = getActiveChat();
  if (!chat) {
    msgs.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">选择一个对话或创建新对话开始角色扮演</div>';
    return;
  }
  if (chat.messages.length === 0) {
    msgs.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">发送第一条消息开始对话...</div>';
    return;
  }

  var html = '';
  chat.messages.forEach(function(msg) {
    if (msg.role === 'system') return;
    if (msg.role === 'assistant') {
      var parsed = parseGameModeOutput(msg.content);
      // Thinking fold
      if (parsed.thinking) {
        html += '<details class="msg-thinking-fold"><summary>💭 内心独白</summary><div class="think-content">' + escapeHtml(parsed.thinking) + '</div></details>';
      }
      if (parsed.think) {
        html += '<details class="msg-thinking-fold"><summary>💭 思考</summary><div class="think-content">' + escapeHtml(parsed.think) + '</div></details>';
      }
      // Vars
      if (parsed.vars) {
        html += '<div class="msg-vars">📊 ' + escapeHtml(parsed.vars) + '</div>';
      }
      // Summary
      if (parsed.sum) {
        html += '<div class="msg-summary">📝 ' + escapeHtml(parsed.sum) + '</div>';
      }
      // Main text
      html += '<div class="msg-maintext">' + escapeHtml(parsed.maintext) + '</div>';
      // Options
      if (parsed.option.length > 0) {
        html += '<div class="msg-options">';
        parsed.option.forEach(function(opt) {
          html += '<button class="msg-option-btn" onclick="selectTavernOption(\'' + escapeHtmlAttr(opt) + '\')">' + escapeHtml(opt) + '</button>';
        });
        html += '</div>';
      }
      // Also parse <branches> tags
      var branches = parseBranchOptions(msg.content);
      if (branches.length > 0) {
        html += '<div style="font-size:9px;color:var(--text-dim);margin:4px 0 8px;">——分支选项——</div><div class="msg-options">';
        branches.forEach(function(opt) {
          html += '<button class="msg-option-btn" onclick="selectTavernOption(\'' + escapeHtmlAttr(opt) + '\')">' + escapeHtml(opt) + '</button>';
        });
        html += '</div>';
      }
    } else if (msg.role === 'user') {
      html += '<div class="msg user">' + escapeHtml(msg.content) + '</div>';
    }
  });
  msgs.innerHTML = html;
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeHtmlAttr(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// -- Tavern Chat Actions --
async function createNewTavernChat() {
  var settings = tavernState.tavernSettings;
  var charName = tavernState.characterCard ? tavernState.characterCard.name : '角色';
  var count = tavernState.chats.filter(function(c) { return c.characterName === charName; }).length;
  var chat = createChatSession({
    name: charName + ' - 对话 ' + (count + 1),
    characterName: charName,
    presetId: settings.activePresetId || (tavernState.presets[0] ? tavernState.presets[0].id : ''),
    lorebookIds: tavernState.activeLorebookIds.slice()
  });
  // Insert first message if character card has one
  if (tavernState.characterCard && tavernState.characterCard.firstMessage) {
    var parsed = parseGameModeOutput(tavernState.characterCard.firstMessage);
    chat.messages.push(createChatMessage('assistant', tavernState.characterCard.firstMessage));
  }
  await db.chats.put(chat);
  tavernState.chats.unshift(chat);
  tavernState.activeChatId = chat.id;
  renderTavernSessionList();
  renderTavernMessages();
  updateTavernInfo();
}

function switchTavernChat(id) {
  tavernState.activeChatId = id;
  renderTavernSessionList();
  renderTavernMessages();
  updateTavernInfo();
}

async function deleteTavernChat(id) {
  await db.chats.delete(id);
  tavernState.chats = tavernState.chats.filter(function(c) { return c.id !== id; });
  if (tavernState.activeChatId === id) {
    tavernState.activeChatId = tavernState.chats.length > 0 ? tavernState.chats[0].id : null;
  }
  renderTavernSessionList();
  renderTavernMessages();
  updateTavernInfo();
}

function selectTavernOption(optionText) {
  var input = document.getElementById('tavern-input');
  if (input) {
    input.value = optionText;
    sendTavernMessage();
  }
}

function handleTavernKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendTavernMessage();
  }
}

async function sendTavernMessage() {
  if (tavernState.isSending) return;
  var input = document.getElementById('tavern-input');
  if (!input) return;
  var content = input.value.trim();
  if (!content) return;

  var chat = getActiveChat();
  if (!chat) {
    await createNewTavernChat();
    chat = getActiveChat();
    if (!chat) return;
  }

  tavernState.isSending = true;
  var btn = document.getElementById('tavern-send-btn');
  var inputEl = document.getElementById('tavern-input');
  if (btn) btn.disabled = true;
  if (inputEl) inputEl.disabled = true;
  input.value = '';

  // Take snapshot before sending (for time rewind)
  takeSnapshot(chat.messages, chat.variables);

  // Add user message
  chat.messages.push(createChatMessage('user', content));
  chat.updatedAt = Date.now();
  renderTavernMessages();

  // Get preset
  var preset = tavernState.presets.find(function(p) { return p.id === chat.presetId; }) || tavernState.presets[0];
  if (!preset) preset = createPreset();

  // Get active lorebooks
  var activeBooks = tavernState.lorebooks.filter(function(b) { return chat.lorebookIds.indexOf(b.id) >= 0; });

  // Match lorebook entries
  var lorebookMatches = matchLorebookEntries(content, activeBooks);

  // Get location from game state
  var location = '加玛帝国·乌坦城';

  // Assemble prompt
  var result = assembleTavernPrompt({
    preset: preset,
    userInput: content,
    history: chat.messages.slice(0, -1),
    variables: chat.variables,
    lorebookMatches: lorebookMatches,
    location: location
  });

  try {
    // Show typing indicator
    var msgs = document.getElementById('tavern-messages');
    if (msgs) {
      var typingDiv = document.createElement('div');
      typingDiv.className = 'msg-maintext typing';
      typingDiv.id = 'tavern-typing';
      msgs.appendChild(typingDiv);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // Try streaming, fallback to non-streaming
    var fullResponse = '';
    var streamParser = StreamParser();
    var streamContent = {};

    streamParser.onTag(function(tag, content) {
      streamContent[tag] = content;
      // Live update the typing indicator with maintext
      if (tag === 'maintext') {
        var typing = document.getElementById('tavern-typing');
        if (typing) typing.textContent = content;
      }
    });

    try {
      fullResponse = await callLLMStream(result.messages, {
        model: preset.settings.openai_model || undefined,
        temperature: preset.settings.temp_openai,
        max_tokens: preset.settings.openai_max_tokens
      }, function(chunk, accumulated) {
        streamParser.feed(chunk);
      });
    } catch(e) {
      // Fallback to non-streaming
      var data = await callLLM(result.messages, {
        model: preset.settings.openai_model || undefined,
        temperature: preset.settings.temp_openai,
        max_tokens: preset.settings.openai_max_tokens
      });
      fullResponse = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
    }

    // Remove typing indicator
    var typing = document.getElementById('tavern-typing');
    if (typing) typing.remove();

    // Apply regex scripts (display layer)
    fullResponse = applyRegexScripts(fullResponse, 0);

    // Parse upstore variables
    var upstoreResult = parseUpstore(fullResponse);
    var processedText = upstoreResult.cleaned;
    var nextVars = mergeVariables(chat.variables || {}, upstoreResult.updates);

    // Handle toggle operations
    upstoreResult.operations.forEach(function(op) {
      if (op.type === 'toggle' && op.key && nextVars.hasOwnProperty(op.key)) {
        if (nextVars[op.key] === true || nextVars[op.key] === 'true' || nextVars[op.key] === 1) {
          nextVars[op.key] = false;
        } else {
          nextVars[op.key] = true;
        }
      }
    });

    // Sync upstore variables to player desire state
    if (nextVars.desireLust !== undefined) {
      var lustVal = parseFloat(nextVars.desireLust);
      if (!isNaN(lustVal)) GameState.player.desireLust = Math.min(100, Math.max(0, lustVal));
    }
    if (nextVars.desirePleasure !== undefined) {
      var pleasVal = parseFloat(nextVars.desirePleasure);
      if (!isNaN(pleasVal)) GameState.player.desirePleasure = Math.min(100, Math.max(0, pleasVal));
    }

    // ── Desire Overflow Mechanics ──

    // Lust check: enter heat state at 100
    if (GameState.player.desireLust >= 100) {
      GameState.player.isInHeat = true;
      if (!chat._heatTriggered) {
        chat._heatTriggered = true;
        processedText = '🔥 *身体深处涌起难以抑制的燥热，呼吸变得急促，眼神逐渐迷离——已然陷入了发情状态...*\n\n' + processedText;
      }
    } else if (GameState.player.desireLust < 30 && GameState.player.isInHeat) {
      // Cool down if lust drops below 30
      GameState.player.isInHeat = false;
      chat._heatTriggered = false;
    }

    // Pleasure check: climax at 100, then decay
    if (GameState.player.desirePleasure >= 100) {
      processedText = processedText + '\n\n💥 *达到高潮——快感如潮水般席卷全身，身体不受控制地微微颤抖，片刻后才缓缓平复...*';
      // Decay pleasure after climax
      GameState.player.desirePleasure = Math.max(0, GameState.player.desirePleasure - 40);
      nextVars.desirePleasure = GameState.player.desirePleasure;
      if (GameState.player.desireLust < 100) {
        // Slight lust reduction too
        GameState.player.desireLust = Math.max(0, GameState.player.desireLust - 10);
        nextVars.desireLust = GameState.player.desireLust;
      }
    }

    // Extract <var> tags as well (legacy support)
    var varResult = extractVariables(processedText);
    nextVars = mergeVariables(nextVars, varResult.updates);
    processedText = varResult.cleanedText;

    // Add assistant message
    chat.messages.push(createChatMessage('assistant', processedText));
    chat.variables = nextVars;
    chat.updatedAt = Date.now();

    await db.chats.put(chat);
    renderTavernMessages();
  } catch(e) {
    var typing2 = document.getElementById('tavern-typing');
    if (typing2) typing2.remove();
    showToast('AI调用失败: ' + e.message, 'error');
    console.error('Tavern send error:', e);
  }

  tavernState.isSending = false;
  if (btn) btn.disabled = false;
  if (inputEl) inputEl.disabled = false;
  inputEl.focus();
}

async function importCharacterCard(event) {
  var file = event.target.files[0];
  if (!file) return;
  try {
    var text = await file.text();
    // Try JSON
    try {
      var json = JSON.parse(text);
      if (json.spec === 'chara_card_v2' || json.data) {
        var data = json.data || json;
        var card = tavernState.characterCard || createDefaultCharacterCard();
        card.name = data.name || json.name || '';
        card.description = data.description || '';
        card.personality = data.personality || '';
        card.scenario = data.scenario || '';
        card.firstMessage = data.first_mes || data.firstMessage || '';
        tavernState.characterCard = card;
        await db.characterCard.put(card);
        closeAllModals();
        showToast('角色卡导入成功：' + card.name, 'success');
        var nameEl = document.getElementById('tavern-char-name');
        if (nameEl) nameEl.textContent = card.name;
        return;
      }
    } catch(e) {}
    // Fallback: treat as plain text character description
    var card2 = tavernState.characterCard || createDefaultCharacterCard();
    card2.description = text.substring(0, 500);
    tavernState.characterCard = card2;
    await db.characterCard.put(card2);
    closeAllModals();
    showToast('已导入文本作为角色描述', 'success');
  } catch(e) {
    showToast('导入失败: ' + e.message, 'error');
  }
}

// Helper: toggle green/blue in entry editor
function toggleEntryConstant() {
  var el = document.getElementById('entry-constant');
  var label = document.getElementById('entry-light-label');
  var keysGroup = document.getElementById('entry-keys-group');
  if (!el) return;
  var isConst = el.value === '1';
  el.value = isConst ? '0' : '1';
  if (label) {
    label.textContent = isConst ? '绿灯 · 关键词触发' : '蓝灯 · 始终发送';
    label.style.color = isConst ? 'var(--accent-green)' : 'var(--accent-blue)';
  }
  if (keysGroup) keysGroup.style.opacity = isConst ? '1' : '0.4';
  // Update the dot
  var dot = document.querySelector('#entry-light-label')?.parentElement?.querySelector('span');
  // Find dot by traversing
  var parent = label ? label.parentElement : null;
  if (parent) {
    var dotEl = parent.querySelector('span');
    if (dotEl) {
      dotEl.style.background = isConst ? '#88cc88' : '#4488ff';
      dotEl.style.boxShadow = isConst ? '0 0 8px #88cc88' : '0 0 8px #4488ff';
    }
  }
}

function updatePresetModelSelect(presetId) {
  var apiEl = document.getElementById('preset-api');
  var modelEl = document.getElementById('preset-model');
  var dataEl = document.getElementById('preset-api-models');
  if (!apiEl || !modelEl || !dataEl) return;
  var apiId = apiEl.value;
  var allModels = JSON.parse(dataEl.getAttribute('data-models').replace(/&quot;/g, '"'));
  var models = apiId ? (allModels[apiId] || []) : [];
  var currentVal = modelEl.value;

function applyRegexScripts(text, placement) {

// -- 3. Branch Options (<branches> parser) --
function parseBranchOptions(text) {
  var re = /<branches>([\s\S]*?)<\/branches>/i;
  var match = re.exec(text);
  if (!match) return [];
  var content = match[1].trim();
  var lines = content.split('\n').filter(function(l) { return l.trim(); });
  return lines.map(function(l) {
    return l.replace(/^[\[\]]/g, '').replace(/[\[\]]$/g, '').trim();
  }).filter(Boolean);
}

// -- 4. Upstore Variable Parser --
function parseUpstore(text) {
  var re = /<upstore>([\s\S]*?)<\/upstore>/i;
  var match = re.exec(text);
  if (!match) return { cleaned: text, updates: {}, operations: [] };
  var content = match[1].trim();
  var cleaned = text.replace(match[0], '').trim();
  var updates = {};
  var ops = [];
  var parts = content.split(/\s+/);
  parts.forEach(function(p) {
    p = p.trim(); if (!p) return;
    // addSmallSum:key:amount
    if (p.startsWith('addSmallSum:')) {
      var kv = p.split(':');
      if (kv.length >= 3) {
        var k = kv[1], amt = parseFloat(kv[2]);
        if (!isNaN(amt)) { updates[k] = (updates[k] || 0) + amt; ops.push({ type:'addSmallSum', key: k, amount: amt }); }
      }
    }
    // set:key:value
    else if (p.startsWith('set:')) {
      var skv = p.split(':');
      if (skv.length >= 3) {
        var sk = skv[1], sv = skv.slice(2).join(':');
        updates[sk] = sv; ops.push({ type:'set', key: sk, value: sv });
      }
    }
    // toggle:key
    else if (p.startsWith('toggle:')) {
      var tk = p.split(':')[1];
      if (tk) { updates[tk] = '__TOGGLE__'; ops.push({ type:'toggle', key: tk }); }
    }
  });
  return { cleaned: cleaned, updates: updates, operations: ops };
}

function rollDice(sides) {
  // Get from pool first, fallback to random
  var die = DICE_POOL.find(function(d) { return d.sides === sides; });
  if (die && die.rolls.length > 0) {
    return die.rolls.shift();
  }
  return Math.floor(Math.random() * sides) + 1;
}

function generateDicePool() {
  DICE_POOL.forEach(function(die) {
    die.rolls = [];

      die.rolls.push(Math.floor(Math.random() * die.sides) + 1);

  });
}

function computeDC(actorRealm, targetRealm) {
  // realm: number (e.g., 斗者=1, 斗师=2, ..., 斗帝=10)
  // Each realm difference doubles the DC
  var diff = Math.abs((targetRealm||1) - (actorRealm||1));
  var baseDC = 10;
  return baseDC * Math.pow(2, diff);
}

// -- Settings Tabs Registration --
var ALL_SETTINGS_TABS = ['core','lorebook','presets','tavern','regex','depth'];

function renderSettingsRegex(body) {
  var html = '<div class="settings-section-title">正则引擎</div>';
  html += '<p style="font-size:11px;color:var(--text-muted);margin-bottom:16px;line-height:1.5;">自动替换 AI 输出中的内容 · placement: 0=显示层 1=Prompt层 2=两层</p>';
  if (regexScripts.length === 0) {
    html += '<div style="text-align:center;padding:30px;color:var(--text-dim);">暂无正则脚本</div>';
  } else {
    regexScripts.forEach(function(rs) {
      html += '<div class="settings-card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<div style="flex:1;">' +
            '<span style="color:var(--text-primary);font-size:13px;font-family:var(--font-serif);">' + (rs.scriptName || '未命名') + '</span>' +
            '<span class="settings-label-chip" style="margin-left:8px;">层' + (rs.placement||'0') + '</span>' +
          '</div>' +
          '<div style="display:flex;gap:6px;">' +
            '<button class="text-btn" onclick="editRegexScript(\'' + rs.id + '\')">编辑</button>' +
            '<button class="text-btn danger" onclick="removeRegexScript(\'' + rs.id + '\')">删除</button>' +
          '</div>' +
        '</div>' +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">' + (rs.findRegex ? rs.findRegex.substring(0,100) : '(空正则)') + '</div>' +
      '</div>';
    });
  }
  html += '<button class="settings-action-btn" onclick="addRegexScript();renderSettingsTab(\'regex\')">＋ 新建脚本</button>';
  body.innerHTML = html;
}

function editRegexScript(id) {
  var rs = regexScripts.find(function(r) { return r.id === id; });
  if (!rs) return;
  var html = '<h3>编辑正则脚本</h3>' +
    '<div class="form-group"><label class="form-label">名称</label><input type="text" id="rs-name" class="form-input" value="' + (rs.scriptName||'') + '"></div>' +
    '<div class="form-group"><label class="form-label">匹配正则</label><textarea id="rs-find" class="form-input" rows="2">' + (rs.findRegex||'') + '</textarea></div>' +
    '<div class="form-group"><label class="form-label">替换为</label><textarea id="rs-replace" class="form-input" rows="2">' + (rs.replaceString||'') + '</textarea></div>' +
    '<div class="form-group"><label class="form-label">注入位置 (0=显示 1=Prompt 2=两层)</label><input type="number" id="rs-placement" class="form-input" value="' + (rs.placement||'0') + '" min="0" max="2"></div>' +
    '<div style="display:flex;gap:10px;justify-content:flex-end;">' +
      '<button class="text-btn" onclick="renderSettingsTab(\'regex\')">返回</button>' +
      '<button class="summary-action-btn" onclick="saveRegexScript(\'' + id + '\')">保存</button>' +
    '</div>';
  showModal(html);
}

function saveRegexScript(id) {
  var rs = regexScripts.find(function(r) { return r.id === id; });
  if (!rs) return;
  rs.scriptName = document.getElementById('rs-name').value;
  rs.findRegex = document.getElementById('rs-find').value;
  rs.replaceString = document.getElementById('rs-replace').value;
  rs.placement = document.getElementById('rs-placement').value;
  closeAllModals();
  renderSettingsTab('regex');
  saveToLocalStorage();
  showToast('正则脚本已保存');
}

function renderSettingsDepth(body) {
  var html = '<div class="settings-section-title">深度性格</div>';
  html += '<p style="font-size:11px;color:var(--text-muted);margin-bottom:16px;line-height:1.5;">五层性格深度，按 NPC 好感度自动切换。AI 回应时根据关系亲密度选择对应深度。</p>';
  var depths = [
    { key:'depth_0', label:'表层', sub:'好感 < 20', color:'#888', border:'rgba(136,136,136,0.2)' },
    { key:'depth_1', label:'浅层', sub:'好感 20–39', color:'#88cc88', border:'rgba(136,204,136,0.2)' },
    { key:'depth_2', label:'中层', sub:'好感 40–59', color:'#4488ff', border:'rgba(68,136,255,0.2)' },
    { key:'depth_3', label:'深层', sub:'好感 60–79', color:'#c084fc', border:'rgba(192,132,252,0.2)' },
    { key:'depth_4', label:'核心', sub:'好感 ≥ 80', color:'#ff6b35', border:'rgba(255,107,53,0.2)' }
  ];
  depths.forEach(function(d) {
    html += '<div class="settings-card" style="border-left:3px solid ' + d.color + ';margin-bottom:10px;">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">' +
        '<span style="color:' + d.color + ';font-family:var(--font-serif);font-size:13px;font-weight:600;">' + d.label + '</span>' +
        '<span style="font-size:10px;color:var(--text-muted);">' + d.sub + '</span>' +
      '</div>' +
      '<textarea id="depth-' + d.key + '" class="settings-form-input settings-textarea" rows="2" style="min-height:60px;border-color:' + d.border + ';">' + (depthPrompts[d.key]||'') + '</textarea>' +
    '</div>';
  });
  html += '<button class="settings-action-btn" onclick="saveAllDepthPrompts()">保存深度性格</button>';
  body.innerHTML = html;
}

function saveAllDepthPrompts() {
  ['depth_0','depth_1','depth_2','depth_3','depth_4'].forEach(function(k) {
    var el = document.getElementById('depth-' + k);
    if (el) depthPrompts[k] = el.value;
  });
  saveToLocalStorage();
  showToast('深度性格已保存');
}

// Extend the settings tab system
function renderSettingsTabExt(key, body) {
  switch(key) {
    case 'regex': renderSettingsRegex(body); break;
    case 'depth': renderSettingsDepth(body); break;
    default: break;
  }
}

// INIT (MERGED)
// ==============================

document.addEventListener('DOMContentLoaded', function() {
  initTitleParticles();
  initTitleCover();
  // Initialize Tavern database (async, non-blocking)
  initTavernDB().catch(function(e) { console.warn('Tavern DB init:', e); });
  var hasData = loadFromLocalStorage();
  var continueBtn = document.getElementById('btn-continue');
  if (continueBtn && hasData) {
    continueBtn.classList.add('primary');
    continueBtn.style.opacity = '1';
  } else if (continueBtn) {
    continueBtn.style.opacity = '0.4';
    continueBtn.style.pointerEvents = 'none';
  }
  // Auto-detect Discord OAuth code in URL
  var urlParams = new URLSearchParams(window.location.search);
  var oauthCode = urlParams.get('code');
  if (oauthCode) {
    // Clean URL
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    // Store code for use when user opens Discord connection dialog
    window._pendingDiscordCode = oauthCode;
    showToast('检测到 Discord 授权码，打开云同步完成连接即可自动填入', 'success');
  }
  // ESC to close settings panel
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var panel = document.getElementById('settings-panel');
      if (panel && panel.classList.contains('show')) {
        closeSettings();
      }
    }
  });
});
