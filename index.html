var SAVES_KEY = 'doupo_saves';

function getSaves() {
  try {
    var raw = localStorage.getItem(SAVES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveSaves(saves) {
  try {
    localStorage.setItem(SAVES_KEY, JSON.stringify(saves));
  } catch(e) { showToast('存档存储空间不足，请清理旧存档', 'error'); }
}

function createSave() {
  var saves = getSaves();
  var save = {
    id: 'save-' + Date.now(),
    name: '存档 ' + (saves.length + 1),
    timestamp: Date.now(),
    player: JSON.parse(JSON.stringify(GameState.player)),
    settings: JSON.parse(JSON.stringify(GameState.settings))
  };
  saves.push(save);
  saveSaves(saves);
  showToast('存档成功！(' + (save.player.name || '未命名角色') + ')', 'success');
  // If save manager is open, re-render
  renderSaveList();
}

function loadSave(id) {
  var saves = getSaves();
  var save = saves.find(function(s) { return s.id === id; });
  if (!save) { showToast('存档不存在', 'error'); return; }
  GameState.player = JSON.parse(JSON.stringify(save.player));
  GameState.settings = JSON.parse(JSON.stringify(save.settings));
  // Propagate settings
  if (GameState.settings.discordConnected === undefined) {
    GameState.settings.discordConnected = false;
    GameState.settings.discordClientId = '';
  }
  saveToLocalStorage();
  closeAllModals();
  if (GameState.phase === 'game') {
    initGameWorld();
  }
  showToast('存档加载成功！欢迎回来，' + (save.player.name || '未知'), 'success');
}

function exportSave(id) {
  var saves = getSaves();
  var save = saves.find(function(s) { return s.id === id; });
  if (!save) { showToast('存档不存在', 'error'); return; }
  var playerName = (save.player.name || '未知');
  var dateStr = new Date(save.timestamp).toISOString().slice(0, 10);
  var filename = '斗破苍穹_存档_' + playerName + '_' + dateStr + '.json';
  var blob = new Blob([JSON.stringify(save, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('存档已导出：' + filename, 'success');
}

function deleteSave(id) {
  var saves = getSaves();
  var save = saves.find(function(s) { return s.id === id; });
  if (!save) return;
  if (!confirm('确定要删除存档「' + (save.name || '未命名') + '」吗？此操作不可撤销。')) return;
  saves = saves.filter(function(s) { return s.id !== id; });
  saveSaves(saves);
  showToast('存档已删除', 'info');
  renderSaveList();
}

function importSave(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var save = JSON.parse(e.target.result);
      if (!save.id || !save.player || !save.timestamp) {
        showToast('无效的存档文件格式', 'error');
        return;
      }
      var saves = getSaves();
      // Avoid duplicate IDs
      var exists = saves.find(function(s) { return s.id === save.id; });
      if (exists) {
        save.id = 'save-' + Date.now();
        save.name = (save.name || '导入存档') + ' (导入)';
      }
      saves.push(save);
      saveSaves(saves);
      showToast('存档导入成功！', 'success');
      renderSaveList();
    } catch(ex) {
      showToast('存档文件解析失败', 'error');
    }
  };
  reader.readAsText(file);
}

function openSaveManager() {
  var saves = getSaves();
  var content =
    '<h3 style="margin-bottom:16px;">存档管理</h3>' +
    '<div style="display:flex;gap:8px;margin-bottom:12px;">' +
      '<button class="save-action-btn primary" onclick="createSave();setTimeout(function(){renderSaveList();},200)" style="flex:1;">+ 新建存档</button>' +
      '<button class="save-action-btn" onclick="document.getElementById(\'import-file-input\').click()" style="flex:1;">📥 导入存档</button>' +
      '<input type="file" id="import-file-input" accept=".json" style="display:none;" onchange="importSave(this.files[0])">' +
    '</div>' +
    '<div id="save-list-container" style="max-height:50vh;overflow-y:auto;">' +
      renderSaveListInner(saves) +
    '</div>';
  showModal(content);
  // Initialize file input
  setTimeout(function() {
    var fileInput = document.getElementById('import-file-input');
    if (fileInput) {
      fileInput.value = '';
      fileInput.onchange = function() { if (this.files[0]) importSave(this.files[0]); };
    }

}

function renderSaveList() {
  var container = document.getElementById('save-list-container');
  if (!container) return;
  var saves = getSaves();
  container.innerHTML = renderSaveListInner(saves);
}

function renderSaveListInner(saves) {
  if (!saves || saves.length === 0) {
    return '<div class="save-empty">暂无存档</div>';
  }
  return saves.sort(function(a, b) { return b.timestamp - a.timestamp; }).map(function(save, idx) {
    var playerName = (save.player && save.player.name) || '未命名';
    var difficulty = (save.player && save.player.difficulty) || '未知';
    var race = (save.player && save.player.race) || '';
    var raceName = '';
    if (race) {
      var raceObj = RACES.find(function(r) { return r.id === race; });
      raceName = raceObj ? raceObj.name : race;
    }
    var dateStr = new Date(save.timestamp).toLocaleString('zh-CN');
    var sizeStr = JSON.stringify(save).length;
    var sizeDisplay = sizeStr > 1024 ? (sizeStr / 1024).toFixed(1) + ' KB' : sizeStr + ' B';
    return '<div class="save-entry">' +
      '<div class="save-entry-header">' +
        '<span class="save-entry-name">' + (save.name || '存档 ' + (idx + 1)) + '</span>' +
        '<span style="font-size:10px;color:var(--text-dim);">' + sizeDisplay + '</span>' +
      '</div>' +
      '<div class="save-entry-meta">' +
        '角色：' + playerName + ' · 难度：' + difficulty + ' · 种族：' + (raceName || '无') + ' · ' + dateStr +
      '</div>' +
      '<div class="save-entry-actions">' +
        '<button class="save-action-btn primary" onclick="loadSave(\'' + save.id + '\')">加载</button>' +
        '<button class="save-action-btn" onclick="exportSave(\'' + save.id + '\')">导出</button>' +
        '<button class="save-action-btn danger" onclick="deleteSave(\'' + save.id + '\')">删除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function buildSummaryTab(key, label) {
  var cls = key === summaryActiveTab ? ' active' : '';
  return '<button class="summary-tab' + cls + '" data-tab="' + key + '" onclick="switchSummaryTab(\'' + key + '\')">' + label + '</button>';
}

function switchSummaryTab(key) {
  summaryActiveTab = key;
  var tabs = document.querySelectorAll('#summary-tabs .summary-tab');
  tabs.forEach(function(t) {
    t.classList.remove('active');
    if (t.getAttribute('data-tab') === key) t.classList.add('active');
  });
  renderSummaryTab(key);
}

function renderSummaryTab(key) {
  var body = document.getElementById('summary-body');
  if (!body) return;
  switch(key) {
    case 'basic': renderSummaryBasic(body); break;
    case 'secret': renderSummarySecret(body); break;
    case 'stats': renderSummaryStats(body); break;
    case 'inventory': renderSummaryInventory(body); break;
    case 'equipment': renderSummaryEquipment(body); break;
    case 'skills': renderSummarySkills(body); break;
    case 'relationships': renderSummaryRelationships(body); break;
    case 'talents': renderSummaryTalents(body); break;
    case 'history': renderSummaryHistory(body); break;
  }
}

function renderDesireOrb(label, value, color1, color2, cssClass) {
  var pct = Math.min(100, Math.max(0, value || 0));
  var r = 56, cx = 64, cy = 64;
  // Water level: fill from bottom
  var waterH = (pct / 100) * (r * 2 - 8);
  var waterY = cy + r - 4 - waterH;

  return '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">' +
    // Orb container
    '<div style="position:relative;width:128px;height:128px;">' +
      // Outer glow ring
      '<svg width="128" height="128" viewBox="0 0 128 128" style="position:absolute;top:0;left:0;">' +
        // Glow ring
        '<circle cx="64" cy="64" r="58" fill="none" stroke="' + color1 + '" stroke-width="2" opacity="0.5"/>' +
        '<circle cx="64" cy="64" r="60" fill="none" stroke="' + color1 + '" stroke-width="1" opacity="0.25"/>' +
        // Background circle
        '<defs>' +
          '<radialGradient id="orbBg-' + cssClass + '" cx="50%" cy="40%" r="50%">' +
            '<stop offset="0%" stop-color="' + color1 + '" stop-opacity="0.15"/>' +
            '<stop offset="100%" stop-color="#050508" stop-opacity="0.9"/>' +
          '</radialGradient>' +
          '<clipPath id="orbClip-' + cssClass + '">' +
            '<circle cx="64" cy="64" r="52"/>' +
          '</clipPath>' +
          // Water gradient
          '<linearGradient id="waterGrad-' + cssClass + '" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0%" stop-color="' + color2 + '" stop-opacity="0.95"/>' +
            '<stop offset="40%" stop-color="' + color1 + '" stop-opacity="0.85"/>' +
            '<stop offset="100%" stop-color="' + color1 + '" stop-opacity="0.5"/>' +
          '</linearGradient>' +
        '</defs>' +
        // Dark orb background
        '<circle cx="64" cy="64" r="54" fill="url(#orbBg-' + cssClass + ')" stroke="' + color1 + '" stroke-width="1" opacity="0.4"/>' +
        // Water fill (clipped to circle)
        '<g clip-path="url(#orbClip-' + cssClass + ')">' +
          '<rect x="12" y="' + waterY + '" width="104" height="' + (104 - (waterY - 12)) + '" fill="url(#waterGrad-' + cssClass + ')" rx="0">' +
            // Surface wave
            '<animate attributeName="y" values="' + waterY + ';' + (waterY - 2) + ';' + waterY + '" dur="3s" repeatCount="indefinite"/>' +
          '</rect>' +
          // Surface shimmer line
          '<ellipse cx="64" cy="' + waterY + '" rx="48" ry="3" fill="' + color2 + '" opacity="0.5">' +
            '<animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>' +
          '</ellipse>' +
        '</g>' +
        // Inner highlight (glassy reflection)
        '<ellipse cx="48" cy="40" rx="20" ry="12" fill="white" opacity="0.06"/>' +
        // Rim light
        '<circle cx="64" cy="64" r="52" fill="none" stroke="' + color1 + '" stroke-width="1.5" opacity="0.6"/>' +
      '</svg>' +
      // Center text
      '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;">' +
        '<span style="font-family:var(--font-serif);font-size:26px;font-weight:900;color:' + color2 + ';text-shadow:0 0 12px ' + color1 + ';">' + pct + '</span>' +
        '<span style="display:block;font-size:10px;color:' + color1 + ';">/ 100</span>' +
      '</div>' +
    '</div>' +
    // Label below
    '<span style="font-family:var(--font-serif);font-size:12px;color:' + color1 + ';letter-spacing:2px;">' + label + '</span>' +
  '</div>';
}

// -- Lorebook Engine --
function matchLorebookEntries(userInput, lorebooks) {
  var results = [];
  lorebooks.forEach(function(book) {
    book.entries.forEach(function(entry) {
      if (!entry.enabled) return;
      var matched = false;
      var searchText = userInput.toLowerCase();
      entry.keys.forEach(function(key) {
        if (key && searchText.indexOf(key.toLowerCase()) >= 0) matched = true;
      });
      if (!matched && entry.secondaryKeys) {
        entry.secondaryKeys.forEach(function(key) {
          if (key && searchText.indexOf(key.toLowerCase()) >= 0) matched = true;
        });
      }
      if (matched) results.push({ bookId: book.id, bookName: book.name, entry: entry });
    });
  });
  return results;
}

// -- Variable System --
function extractVariables(text) {
  var updates = {};
  var cleanedText = text;
  var re = /<var\s+name\s*=\s*"([^"]+)"\s+value\s*=\s*"([^"]+)"\s*\/>/gi;
  var match;
  while ((match = re.exec(text)) !== null) {
    updates[match[1]] = match[2];
    cleanedText = cleanedText.replace(match[0], '');
  }
  return { cleanedText: cleanedText.trim(), updates: updates };
}

function mergeVariables(current, updates) {
  var merged = {};
  for (var k in current) { if (current.hasOwnProperty(k)) merged[k] = current[k]; }
  for (var k in updates) { if (updates.hasOwnProperty(k)) merged[k] = updates[k]; }
  return merged;
}

// -- Parse Game Mode Output --
function parseGameModeOutput(rawText) {
  var result = { maintext:'', option:[], sum:'', vars:{}, thinking:'', think:'' };
  var re = /##\s*(\w+)\s*\n([\s\S]*?)(?=\n##\s|\n*$)/g;
  var match;
  while ((match = re.exec(rawText)) !== null) {
    var tag = match[1].toLowerCase();
    var content = match[2].trim();
    switch(tag) {
      case 'maintext': result.maintext = content; break;
      case 'option':
        var lines = content.split('\n');
        lines.forEach(function(line) {
          var cleaned = line.replace(/^[-*]\s*\[?\s*[x ]?\s*\]?\s*/, '').trim();
          if (cleaned) result.option.push(cleaned);
        });
        break;
      case 'sum': result.sum = content; break;
      case 'vars': result.vars = content; break;
      case 'thinking': result.thinking = content; break;
      case 'think': result.think = content; break;
    }
  }
  if (!result.maintext && rawText.trim()) {
    result.maintext = rawText.trim();
  }
  return result;
}

// -- Prompt Assembler --
function assembleTavernPrompt(opts) {
  opts = opts || {};
  var preset = opts.preset;
  var charCard = opts.characterCard || tavernState.characterCard;
  var userName = opts.userName || '玩家';
  var charName = charCard ? charCard.name : '角色';
  var userInput = opts.userInput || '';
  var history = opts.history || [];
  var variables = opts.variables || {};
  var lorebookMatches = opts.lorebookMatches || [];
  var location = opts.location || '加玛帝国·乌坦城';

  var systemParts = [];

  if (preset && preset.promptOrder) {
    preset.promptOrder.forEach(function(item) {
      if (!item.enabled) return;
      switch(item.id) {
        case 'system_main':
          if (preset.prompt_main) systemParts.push(preset.prompt_main);
          break;
        case 'system_nsfw':
          if (preset.prompt_nsfw) systemParts.push(preset.prompt_nsfw);
          break;
        case 'jailbreak':
          if (preset.jailbreak) systemParts.push(preset.jailbreak);
          break;
        case 'char_description':
          if (charCard && charCard.description) systemParts.push('【' + charName + '描述】\n' + charCard.description);
          break;
        case 'char_personality':
          if (charCard && charCard.personality) systemParts.push('【' + charName + '性格】\n' + charCard.personality);
          break;
        case 'scenario':
          if (charCard && charCard.scenario) systemParts.push('【当前场景】\n' + charCard.scenario + '\n当前时间地点：' + location);
          break;
        case 'world_info':
          if (lorebookMatches.length > 0) {
            var wiText = '【世界信息】\n';
            lorebookMatches.forEach(function(m) {
              wiText += '[' + m.bookName + '] ' + m.entry.content + '\n';
            });
            systemParts.push(wiText);
          }
          break;
      }
    });
  }

  // Depth prompt (based on relationship affinity)
  var mainAffinity = 50; // default middle
  if (GameState.player.relationships && GameState.player.relationships.length > 0) {
    mainAffinity = GameState.player.relationships[0].affinity || 50;
  }
  var depthPrompt = getDepthPrompt(mainAffinity);
  if (depthPrompt) systemParts.push(depthPrompt);

  // Style guide
  systemParts.push('【文体指导】\n' + getStyleGuide());

  // Dice pool
  generateDicePool();
  systemParts.push('[协议：公平骰池]\n检定规则：本次判定可用骰池(可根据情景选择一个骰子进行调用，只能使用以下的骰子，禁止随机)：\n' + getDicePoolText() + '\n[/协议：公平骰池]');

  // NPC dynamic rules
  systemParts.push('【NPC生成规则】\n' + NPC_DYNAMIC_RULES.join('\n'));

  // Title/honorific rules
  systemParts.push('【称谓规则】\n严格按境界差距使用称谓——道友(同辈或接近)、前辈(高于己者)、晚辈(低于己者)。称谓错误可能招致杀身之祸。');

  // Variables injection
  var varKeys = Object.keys(variables);
  if (varKeys.length > 0) {
    var varText = '【当前状态变量】\n';
    varKeys.forEach(function(k) { varText += k + ': ' + variables[k] + '\n'; });
    systemParts.push(varText);
  }

  // Branch options + upstore format instruction
  systemParts.push('【输出格式要求】\n请严格按以下XML标签分段输出：\n## maintext\n(正文叙述)\n\n## option\n- [ ] 选项1\n...\n\n在正文后必须生成<branches></branches>包裹的选项分支:\n<branches>\n[快速推进的行动]\n[最合理的行动]\n[最中立的行动]\n[最善良的行动]\n[NSFW的行动]\n</branches>\n\n同时必须紧跟<upstore></upstore>变量更新块:\n<upstore>\naddSmallSum:变量名:增量\nset:变量名:值\n</upstore>\n\n## sum\n(一句话总结)\n\n如有内心独白请放入 ## thinking 标签中。');

  var systemMsg = systemParts.join('\n\n');

  var messages = [];
  messages.push({ role:'system', content: systemMsg });

  // First message if available
  if (charCard && charCard.firstMessage && history.length === 0) {
    messages.push({ role:'assistant', content: charCard.firstMessage });
  }

  // Chat history
  history.forEach(function(msg) {
    messages.push({ role: msg.role, content: msg.content });
  });

  // Current user input
  if (userInput) {
    messages.push({ role: 'user', content: userInput });
  }

  return { messages: messages, systemMsg: systemMsg };
}

// -- Stream Parser --
function StreamParser() {
  var buffer = '';
  var currentTag = '';
  var tagContent = {};
  var listeners = [];

  function feed(chunk) {
    buffer += chunk;
    // Try to extract complete tagged sections
    var re = /##\s*(\w+)\s*\n([\s\S]*?)(?=\n##\s|$)/g;
    var lastIndex = 0;
    var match;
    var newContent = {};
    while ((match = re.exec(buffer)) !== null) {
      lastIndex = match.index + match[0].length;
      newContent[match[1].toLowerCase()] = match[2].trim();
    }
    buffer = buffer.substring(lastIndex);
    // Notify listeners
    for (var k in newContent) {
      if (newContent.hasOwnProperty(k)) {
        listeners.forEach(function(fn) { fn(k, newContent[k]); });
      }
    }
    return newContent;
  }

  function onTag(fn) { listeners.push(fn); }
  function reset() { buffer = ''; currentTag = ''; tagContent = {}; }

  return { feed: feed, onTag: onTag, reset: reset };
}

  if (settings.apis && settings.apis.length > 0 && settings.activeApi) {

async function callLLM(messages, opts) {
  opts = opts || {};
  var api = getTavernApi();
  if (!api) throw new Error('未配置API接口，请在设置中添加');

  var body = {
    model: opts.model || api.model || 'gpt-4o-mini',
    messages: messages
  };
  if (opts.temperature !== undefined) body.temperature = opts.temperature;
  if (opts.max_tokens !== undefined) body.max_tokens = opts.max_tokens;
  if (opts.top_p !== undefined) body.top_p = opts.top_p;
  if (opts.frequency_penalty !== undefined) body.frequency_penalty = opts.frequency_penalty;
  if (opts.presence_penalty !== undefined) body.presence_penalty = opts.presence_penalty;
  if (opts.stream !== undefined) body.stream = opts.stream;

  var response = await fetch(api.url + '/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + api.apiKey, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!response.ok) throw new Error('API error: ' + response.status);
  return response.json();
}

async function callLLMStream(messages, opts, onChunk) {
  opts = opts || {};
  opts.stream = true;
  var api = getTavernApi();
  if (!api) throw new Error('未配置API接口');

  var body = {
    model: opts.model || api.model || 'gpt-4o-mini',
    messages: messages,
    stream: true
  };
  if (opts.temperature !== undefined) body.temperature = opts.temperature;

  var response = await fetch(api.url + '/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + api.apiKey, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!response.ok) throw new Error('API error: ' + response.status);

  var reader = response.body.getReader();
  var decoder = new TextDecoder();
  var fullContent = '';

  while (true) {
    var result = await reader.read();
    if (result.done) break;
    var text = decoder.decode(result.value, { stream: true });
    var lines = text.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.startsWith('data: ')) {
        var data = line.substring(6);
        if (data === '[DONE]') break;
        try {
          var json = JSON.parse(data);
          var delta = json.choices && json.choices[0] && json.choices[0].delta;
          if (delta && delta.content) {
            fullContent += delta.content;
            if (onChunk) onChunk(delta.content, fullContent);
          }
        } catch(e) {}
      }
    }
  }
  return fullContent;
}

      var parsed = parseGameModeOutput(msg.content);
      // Thinking fold
      if (parsed.thinking) {
        html += '<details class="msg-thinking-fold"><summary>💭 内心独白</summary><div class="think-content">' + escapeHtml(parsed.thinking) + '</div></details>';
      }
      if (parsed.think) {

      }
      // Vars
      if (parsed.vars) {
        html += '<div class="msg-vars">📊 ' + escapeHtml(parsed.vars) + '</div>';
      }
      // Summary
      if (parsed.sum) {
        html += '<div class="msg-summary">📝 ' + escapeHtml(parsed.sum) + '</div>';
      }
      // Main text
      html += '<div class="msg-maintext">' + escapeHtml(parsed.maintext) + '</div>';
      // Options
      if (parsed.option.length > 0) {
        html += '<div class="msg-options">';
        parsed.option.forEach(function(opt) {
          html += '<button class="msg-option-btn" onclick="selectTavernOption(\'' + escapeHtmlAttr(opt) + '\')">' + escapeHtml(opt) + '</button>';
        });
        html += '</div>';
      }
      // Also parse <branches> tags
      var branches = parseBranchOptions(msg.content);
      if (branches.length > 0) {
        html += '<div style="font-size:9px;color:var(--text-dim);margin:4px 0 8px;">——分支选项——</div><div class="msg-options">';
        branches.forEach(function(opt) {
          html += '<button class="msg-option-btn" onclick="selectTavernOption(\'' + escapeHtmlAttr(opt) + '\')">' + escapeHtml(opt) + '</button>';
        });
        html += '</div>';
      }
    } else if (msg.role === 'user') {
      html += '<div class="msg user">' + escapeHtml(msg.content) + '</div>';
    }
  });
  msgs.innerHTML = html;
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeHtmlAttr(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    presetId: settings.activePresetId || (tavernState.presets[0] ? tavernState.presets[0].id : ''),
    lorebookIds: tavernState.activeLorebookIds.slice()
  });

async function sendTavernMessage() {
  if (tavernState.isSending) return;
  var input = document.getElementById('tavern-input');
  if (!input) return;
  var content = input.value.trim();
  if (!content) return;

  var chat = getActiveChat();
  if (!chat) {
    await createNewTavernChat();
    chat = getActiveChat();
    if (!chat) return;
  }

  tavernState.isSending = true;
  var btn = document.getElementById('tavern-send-btn');
  var inputEl = document.getElementById('tavern-input');
  if (btn) btn.disabled = true;
  if (inputEl) inputEl.disabled = true;
  input.value = '';

  // Add user message
  chat.messages.push(createChatMessage('user', content));
  chat.updatedAt = Date.now();
  renderTavernMessages();

  // Get preset
  var preset = tavernState.presets.find(function(p) { return p.id === chat.presetId; }) || tavernState.presets[0];
  if (!preset) preset = createPreset();

  // Get active lorebooks
  var activeBooks = tavernState.lorebooks.filter(function(b) { return chat.lorebookIds.indexOf(b.id) >= 0; });

  // Match lorebook entries
  var lorebookMatches = matchLorebookEntries(content, activeBooks);

  // Get location from game state
  var location = '加玛帝国·乌坦城';

  // Assemble prompt
  var result = assembleTavernPrompt({
    preset: preset,
    userInput: content,
    history: chat.messages.slice(0, -1),
    variables: chat.variables,
    lorebookMatches: lorebookMatches,
    location: location
  });

  try {
    // Show typing indicator
    var msgs = document.getElementById('tavern-messages');
    if (msgs) {
      var typingDiv = document.createElement('div');
      typingDiv.className = 'msg-maintext typing';
      typingDiv.id = 'tavern-typing';
      msgs.appendChild(typingDiv);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // Try streaming, fallback to non-streaming
    var fullResponse = '';
    var streamParser = StreamParser();
    var streamContent = {};

    streamParser.onTag(function(tag, content) {
      streamContent[tag] = content;
      // Live update the typing indicator with maintext
      if (tag === 'maintext') {
        var typing = document.getElementById('tavern-typing');
        if (typing) typing.textContent = content;
      }
    });

    try {
      fullResponse = await callLLMStream(result.messages, {
        model: preset.settings.openai_model || undefined,
        temperature: preset.settings.temp_openai,
        max_tokens: preset.settings.openai_max_tokens
      }, function(chunk, accumulated) {
        streamParser.feed(chunk);
      });
    } catch(e) {
      // Fallback to non-streaming
      var data = await callLLM(result.messages, {
        model: preset.settings.openai_model || undefined,
        temperature: preset.settings.temp_openai,
        max_tokens: preset.settings.openai_max_tokens
      });
      fullResponse = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
    }

    // Remove typing indicator
    var typing = document.getElementById('tavern-typing');
    if (typing) typing.remove();

    // Apply regex scripts (display layer)
    fullResponse = applyRegexScripts(fullResponse, 0);

    // Parse upstore variables
    var upstoreResult = parseUpstore(fullResponse);
    var processedText = upstoreResult.cleaned;
    var nextVars = mergeVariables(chat.variables || {}, upstoreResult.updates);

    // Handle toggle operations
    upstoreResult.operations.forEach(function(op) {
      if (op.type === 'toggle' && op.key && nextVars.hasOwnProperty(op.key)) {
        if (nextVars[op.key] === true || nextVars[op.key] === 'true' || nextVars[op.key] === 1) {
          nextVars[op.key] = false;
        } else {
          nextVars[op.key] = true;
        }
      }
    });

    // Sync upstore variables to player desire state
    if (nextVars.desireLust !== undefined) {
      var lustVal = parseFloat(nextVars.desireLust);
      if (!isNaN(lustVal)) GameState.player.desireLust = Math.min(100, Math.max(0, lustVal));
    }
    if (nextVars.desirePleasure !== undefined) {
      var pleasVal = parseFloat(nextVars.desirePleasure);
      if (!isNaN(pleasVal)) GameState.player.desirePleasure = Math.min(100, Math.max(0, pleasVal));
    }

    // ── Desire Overflow Mechanics ──

    // Lust check: enter heat state at 100
    if (GameState.player.desireLust >= 100) {
      GameState.player.isInHeat = true;
      if (!chat._heatTriggered) {
        chat._heatTriggered = true;
        processedText = '🔥 *身体深处涌起难以抑制的燥热，呼吸变得急促，眼神逐渐迷离——已然陷入了发情状态...*\n\n' + processedText;
      }
    } else if (GameState.player.desireLust < 30 && GameState.player.isInHeat) {
      // Cool down if lust drops below 30
      GameState.player.isInHeat = false;
      chat._heatTriggered = false;
    }

    // Pleasure check: climax at 100, then decay
    if (GameState.player.desirePleasure >= 100) {
      processedText = processedText + '\n\n💥 *达到高潮——快感如潮水般席卷全身，身体不受控制地微微颤抖，片刻后才缓缓平复...*';
      // Decay pleasure after climax
      GameState.player.desirePleasure = Math.max(0, GameState.player.desirePleasure - 40);
      nextVars.desirePleasure = GameState.player.desirePleasure;
      if (GameState.player.desireLust < 100) {
        // Slight lust reduction too
        GameState.player.desireLust = Math.max(0, GameState.player.desireLust - 10);
        nextVars.desireLust = GameState.player.desireLust;
      }
    }

    // Extract <var> tags as well (legacy support)
    var varResult = extractVariables(processedText);
    nextVars = mergeVariables(nextVars, varResult.updates);
    processedText = varResult.cleanedText;

    // Add assistant message
    chat.messages.push(createChatMessage('assistant', processedText));
    chat.variables = nextVars;
    chat.updatedAt = Date.now();

    await db.chats.put(chat);
    renderTavernMessages();
  } catch(e) {
    var typing2 = document.getElementById('tavern-typing');
    if (typing2) typing2.remove();
    showToast('AI调用失败: ' + e.message, 'error');
    console.error('Tavern send error:', e);

async function importCharacterCard(event) {
  var file = event.target.files[0];
  if (!file) return;
  try {
    var text = await file.text();
    // Try JSON
    try {
      var json = JSON.parse(text);
      if (json.spec === 'chara_card_v2' || json.data) {
        var data = json.data || json;
        var card = tavernState.characterCard || createDefaultCharacterCard();
        card.name = data.name || json.name || '';
        card.description = data.description || '';
        card.personality = data.personality || '';
        card.scenario = data.scenario || '';
        card.firstMessage = data.first_mes || data.firstMessage || '';
        tavernState.characterCard = card;
        await db.characterCard.put(card);
        closeAllModals();
        showToast('角色卡导入成功：' + card.name, 'success');
        var nameEl = document.getElementById('tavern-char-name');
        if (nameEl) nameEl.textContent = card.name;
        return;
      }
    } catch(e) {}
    // Fallback: treat as plain text character description
    var card2 = tavernState.characterCard || createDefaultCharacterCard();
    card2.description = text.substring(0, 500);
    tavernState.characterCard = card2;
    await db.characterCard.put(card2);
    closeAllModals();
    showToast('已导入文本作为角色描述', 'success');
  } catch(e) {
    showToast('导入失败: ' + e.message, 'error');
  }
}

];

function applyRegexScripts(text, placement) {
  // placement: 0=display, 1=prompt, 2=both
  var result = text;
  regexScripts.forEach(function(rs) {
    if (rs.disabled) return;
    var pl = parseInt(rs.placement) || 0;
    if (pl !== 2 && pl !== placement && placement !== 2) return;
    try {
      var re = new RegExp(rs.findRegex, 'g' + (rs.substituteRegex ? '' : ''));
      result = result.replace(re, rs.replaceString || '');
    } catch(e) { console.warn('Regex error:', rs.scriptName, e); }
  });
  return result;
}

function getDepthPrompt(affinity) {

// -- 3. Branch Options (<branches> parser) --
function parseBranchOptions(text) {
  var re = /<branches>([\s\S]*?)<\/branches>/i;
  var match = re.exec(text);
  if (!match) return [];
  var content = match[1].trim();
  var lines = content.split('\n').filter(function(l) { return l.trim(); });
  return lines.map(function(l) {
    return l.replace(/^[\[\]]/g, '').replace(/[\[\]]$/g, '').trim();
  }).filter(Boolean);
}

// -- 4. Upstore Variable Parser --
function parseUpstore(text) {
  var re = /<upstore>([\s\S]*?)<\/upstore>/i;
  var match = re.exec(text);
  if (!match) return { cleaned: text, updates: {}, operations: [] };
  var content = match[1].trim();
  var cleaned = text.replace(match[0], '').trim();
  var updates = {};
  var ops = [];
  var parts = content.split(/\s+/);
  parts.forEach(function(p) {
    p = p.trim(); if (!p) return;
    // addSmallSum:key:amount
    if (p.startsWith('addSmallSum:')) {
      var kv = p.split(':');
      if (kv.length >= 3) {
        var k = kv[1], amt = parseFloat(kv[2]);
        if (!isNaN(amt)) { updates[k] = (updates[k] || 0) + amt; ops.push({ type:'addSmallSum', key: k, amount: amt }); }
      }
    }
    // set:key:value
    else if (p.startsWith('set:')) {
      var skv = p.split(':');
      if (skv.length >= 3) {
        var sk = skv[1], sv = skv.slice(2).join(':');
        updates[sk] = sv; ops.push({ type:'set', key: sk, value: sv });
      }
    }
    // toggle:key
    else if (p.startsWith('toggle:')) {
      var tk = p.split(':')[1];
      if (tk) { updates[tk] = '__TOGGLE__'; ops.push({ type:'toggle', key: tk }); }
    }
  });
  return { cleaned: cleaned, updates: updates, operations: ops };
}

// -- 5. DND Dice Engine --
var DICE_POOL = [
  { sides: 4,   name: 'D4',   rolls: [] },
  { sides: 6,   name: 'D6',   rolls: [] },
  { sides: 8,   name: 'D8',   rolls: [] },
  { sides: 10,  name: 'D10',  rolls: [] },
  { sides: 12,  name: 'D12',  rolls: [] },
  { sides: 20,  name: 'D20',  rolls: [] },
  { sides: 100, name: 'D100', rolls: [] }
];

function rollDice(sides) {
  // Get from pool first, fallback to random
  var die = DICE_POOL.find(function(d) { return d.sides === sides; });
  if (die && die.rolls.length > 0) {
    return die.rolls.shift();
  }
  return Math.floor(Math.random() * sides) + 1;
}

function generateDicePool() {
  DICE_POOL.forEach(function(die) {
    die.rolls = [];
    for (var i = 0; i < 5; i++) {
      die.rolls.push(Math.floor(Math.random() * die.sides) + 1);
    }
  });
}

function getDicePoolHTML() {
  return DICE_POOL.map(function(d) {
    return '<span style="display:inline-block;padding:2px 8px;margin:2px;background:var(--bg-card);border:1px solid var(--border-gold);border-radius:4px;font-size:10px;font-family:var(--font-serif);">' +
      d.name + ': <span style="color:var(--text-primary);">' + d.rolls.join(',') + '</span></span>';
  }).join(' ');
}

function getDicePoolText() {
  return DICE_POOL.map(function(d) {
    return d.name + ': ' + d.rolls.join(', ');
  }).join(' | ');
}

function computeDC(actorRealm, targetRealm) {
  // realm: number (e.g., 斗者=1, 斗师=2, ..., 斗帝=10)
  // Each realm difference doubles the DC
  var diff = Math.abs((targetRealm||1) - (actorRealm||1));
  var baseDC = 10;
  return baseDC * Math.pow(2, diff);
}

// -- 6. Title/Honorific Engine --
function getHonorific(speakerRealm, listenerRealm) {
  var diff = (speakerRealm||1) - (listenerRealm||1);
  if (diff >= 2) return '前辈';   // speaker << listener
  if (diff >= 0) return '道友';   // similar or speaker is slightly lower
  if (diff < -2) return '小辈';  // speaker >> listener
  return '阁下';
}
